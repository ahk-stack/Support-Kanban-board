<head>

<style>
:root{color-scheme:light;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;}
header{background:#fff;border-bottom:1px solid #e2e8f0;padding:11px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}

.tag-chip.selected{opacity:1;border-color:rgba(255,255,255,.5);}
.tag-chip:hover{opacity:.8;}

<header>
  <div class="header-left">
    <h1>📋 Support Kanban <small>support@quinta.im</small></h1>

<script>
// ── Agent & email registry ─────────────────────────────────────────────
const SUPPORT_AGENTS = ['SGU','SHE','ZIO','AHK','IBE','AMJ','ONA','ARA','MEZ','RMD','MAB','SFA','JAT','JFC','JBA','VPO','AZA','RKH','GGO','WPH','CFA','BKH'];
const CS_AGENTS      = ['VGU','TBR','NAO','MBH'];
const ALL_AGENTS     = [...SUPPORT_AGENTS, ...CS_AGENTS];
const CLIENT_TAG     = 'CLIENT';

// trigram → email (all @quinta.im)
const EMAIL_MAP = Object.fromEntries(ALL_AGENTS.map(t=>[t, t.toLowerCase()+'@quinta.im']));

// Teams webhook URL — paste here once you have it
// e.g. 'https://quinta.webhook.office.com/webhookb2/...'
const TEAMS_WEBHOOK = '';

// Deterministic colour per agent (from a curated palette)
const PALETTE = ['#5b21b6','#1d4ed8','#065f46','#b45309','#9d174d','#0e7490','#7c3aed','#166534','#c2410c','#1e40af','#6b21a8','#0369a1','#7e22ce','#15803d','#b91c1c','#0891b2','#4f46e5','#dc2626','#059669','#d97706','#7c3aed','#0f766e'];
function agentColor(t){let h=0;for(const c of t)h=(h*31+c.charCodeAt(0))%PALETTE.length;return PALETTE[h];}

// ── Constants ──────────────────────────────────────────────────────────
const SEARCH_TOOL  = 'mcp__5e170d94-d04a-4d6f-be72-371547a2bf8b__outlook_email_search';
const READ_TOOL    = 'mcp__5e170d94-d04a-4d6f-be72-371547a2bf8b__read_resource';
const SUPPORT_BOX  = 'support@quinta.im';
const CATEGORIES   = ['Technical failure','Bug Velma','RYA','Connectivity request','Other','Spam'];
const PRIORITIES   = ['High','Medium','Low'];
const POLL_SECS    = 60, POLL_WIN_MINS = 5, STORAGE_KEY = 'quinta-kanban-v1';

const NO_REPLY_PATTERNS=['noreply','no-reply','donotreply','do-not-reply','mailer-daemon','postmaster','bounce@','bounces@','notifications@','alerts@','googlealerts','linkedin.com','twitter.com','facebook.com','@mailchimp','@sendgrid','@klaviyo','@constantcontact','executiveassistant@','@e.read.ai','atlassian@','jira@'];
const NO_REPLY_SUBJECTS=['unsubscribe','you are subscribed','mailing list','google alert:','job alert','linkedin notification','weekly digest','monthly digest','order confirmation','shipment notification','your receipt'];

function isAutomatic(e){
  if(!e||!e.sender)return true;
  const sl=e.sender.toLowerCase();
  if(sl===SUPPORT_BOX)return true;
  if(NO_REPLY_PATTERNS.some(p=>sl.includes(p)))return true;
  if(!e.subject&&!e.summary)return true;
  const tl=((e.subject||'')+(e.summary||'')).toLowerCase();
  return NO_REPLY_SUBJECTS.some(p=>tl.includes(p));
}

// ── State ──────────────────────────────────────────────────────────────
const seen={};
let ticketState={},ticketPriority={},ticketCategory={},ticketAssignee={},ticketComments={};
const taggedTickets=new Set();
let allTickets=[],pollSecsLeft=POLL_SECS,activeP='all',activeA='all',sortDesc=true;
let comTicketId=null, selectedTags=new Set();
const currentUser=()=>document.getElementById('current-user').value;

// ── Persistence ────────────────────────────────────────────────────────
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({ticketState,ticketPriority,ticketCategory,ticketAssignee,ticketComments}));}catch(_){}}
function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return;const s=JSON.parse(raw);if(s.ticketState)Object.assign(ticketState,s.ticketState);if(s.ticketPriority)Object.assign(ticketPriority,s.ticketPriority);if(s.ticketCategory)Object.assign(ticketCategory,s.ticketCategory);if(s.ticketAssignee)Object.assign(ticketAssignee,s.ticketAssignee);if(s.ticketComments)Object.assign(ticketComments,s.ticketComments);}catch(_){}}

// ── Helpers ────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function isoMinsAgo(m){return new Date(Date.now()-m*60000).toISOString();}
function isoDaysAgo(d){return new Date(Date.now()-d*86400000).toISOString();}
function fmtDate(iso){if(!iso)return'';const d=new Date(iso),now=new Date(),diff=now-d,mins=Math.floor(diff/60000);if(mins<1)return'Just now';if(mins<60)return mins+'m ago';const hrs=Math.floor(diff/3600000);if(hrs<24)return'Today '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});const days=Math.floor(diff/86400000);if(days===1)return'Yesterday '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});if(days<7)return d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'});}
function senderName(s){if(!s)return'Unknown';if(s.startsWith('/O=')){const m=s.match(/CN=([^/]+)$/i);return m?m[1]:s;}const m=s.match(/^(.+?)@/);return m?m[1].replace(/[._-]/g,' '):s;}

function parseJsonStream(text){const r=[];let d=0,s=-1,inS=false,e2=false;for(let i=0;i<text.length;i++){const c=text[i];if(e2){e2=false;continue;}if(c==='\\'&&inS){e2=true;continue;}if(c==='"'){inS=!inS;continue;}if(inS)continue;if(c==='{'){if(d===0)s=i;d++;}else if(c==='}'){d--;if(d===0&&s!==-1){try{r.push(JSON.parse(text.slice(s,i+1)));}catch(_){}s=-1;}}}return r;}
function extractEmails(res){if(!res||res.isError)return[];if(Array.isArray(res.structuredContent))return res.structuredContent;if(res.structuredContent&&typeof res.structuredContent==='object'){const a=Object.values(res.structuredContent).find(v=>Array.isArray(v));if(a)return a;}const raw=(res.content||[]).map(c=>c.text||'').join('');if(raw.trim().startsWith('['))try{return JSON.parse(raw);}catch(_){}return parseJsonStream(raw);}

// ── Classify ───────────────────────────────────────────────────────────
function classifyPriority(e){const t=((e.subject||'')+(e.summary||'')).toLowerCase();if(e.importance==='high'||/urgent|asap|critical|not working|broken|error|cannot|bloqué/.test(t))return'High';if(/info|question|hello|bonjour|dear/.test(t))return'Low';return'Medium';}
function classifyCategory(e){const t=((e.subject||'')+(e.summary||'')).toLowerCase();if(/connect|integr|pms|channel|webhook|api|crm/.test(t))return'Connectivity request';if(/velma|chatbot|bot/.test(t))return'Bug Velma';if(/rya|rethink|wrong answer/.test(t))return'RYA';if(/technical|down|not working|broken|error|fail/.test(t))return'Technical failure';return'Other';}

// ── Assign ─────────────────────────────────────────────────────────────
function autoAssign(tickets){
  const load=Object.fromEntries(SUPPORT_AGENTS.map(a=>[a,0]));
  Object.entries(ticketAssignee).forEach(([id,a])=>{if(a in load)load[a]++;});
  tickets.forEach(t=>{
    if(ticketAssignee[t.id])return;
    const agent=SUPPORT_AGENTS.reduce((m,a)=>load[a]<load[m]?a:m,SUPPORT_AGENTS[0]);
    ticketAssignee[t.id]=agent;load[agent]++;
  });
}

function updateWorkload(){
  const load=Object.fromEntries(SUPPORT_AGENTS.map(a=>[a,0]));
  allTickets.forEach(t=>{const a=ticketAssignee[t.id];if(a in load)load[a]++;});
  // Show top 5 loaded agents
  const sorted=SUPPORT_AGENTS.map(a=>({a,n:load[a]})).sort((x,y)=>y.n-x.n).slice(0,5);
  const bar=document.getElementById('workload-bar');
  bar.innerHTML=sorted.map(({a,n})=>`<div class="agent-pill" style="background:${agentColor(a)}20;color:${agentColor(a)}">${a} <span class="cnt">${n}</span></div>`).join('');
}

// ── Teams notification ─────────────────────────────────────────────────
async function notifyTeams(tags, comment, ticketSubject, poster){
  if(!TEAMS_WEBHOOK||!tags.length)return;
  const mentions=tags.filter(t=>t!==CLIENT_TAG).map(t=>EMAIL_MAP[t]||t).join(', ');
  const card={
    '@type':'MessageCard',
    '@context':'http://schema.org/extensions',
    themeColor:'5b21b6',
    summary:'New tag in Support Kanban',
    sections:[{
      activityTitle:'New comment in Support Kanban',
      activitySubtitle:`Ticket: ${ticketSubject}`,
      activityImage:'https://cdn-icons-png.flaticon.com/512/732/732221.png',
      facts:[
        {name:'Tagged',value:mentions},
        {name:'From',value:poster},
        {name:'Comment',value:comment.slice(0,300)+(comment.length>300?'…':'')}
      ]
    }]
  };
  try{await fetch(TEAMS_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(card)});}catch(_){}
}

// ── Toast / countdown ──────────────────────────────────────────────────
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4500);}
function startCountdown(){pollSecsLeft=POLL_SECS;const cd=document.getElementById('poll-cd');const tick=setInterval(()=>{pollSecsLeft--;cd.textContent=pollSecsLeft>0?'· '+pollSecsLeft+'s':'· checking…';if(pollSecsLeft<=0)clearInterval(tick);},1000);}

// ── Tagged set ─────────────────────────────────────────────────────────
function rebuildTagged(){
  taggedTickets.clear();
  const me=currentUser();
  Object.entries(ticketComments).forEach(([id,cs])=>{if(cs.some(c=>c.tags.includes(me)))taggedTickets.add(id);});
  document.getElementById('tagged-filter').style.display=taggedTickets.size?'':'none';
}

// ── Build UI from agent list ───────────────────────────────────────────
function buildAgentUI(){
  // "You" selector
  const sel=document.getElementById('current-user');
  sel.innerHTML='<optgroup label="Support">'+SUPPORT_AGENTS.map(a=>`<option value="${a}">${a}</option>`).join('')+'</optgroup>'
    +'<optgroup label="CS">'+CS_AGENTS.map(a=>`<option value="${a}">${a}</option>`).join('')+'</optgroup>';

  // Agent filter dropdown
  const af=document.getElementById('agent-filter');
  af.innerHTML='<option value="all">All agents</option>'
    +'<optgroup label="Support">'+SUPPORT_AGENTS.map(a=>`<option value="${a}">${a}</option>`).join('')+'</optgroup>'
    +'<optgroup label="CS">'+CS_AGENTS.map(a=>`<option value="${a}">${a}</option>`).join('')+'</optgroup>'
    +'<option value="tagged">🔔 Tagged me</option>';

  // Tag chips grid
  const grid=document.getElementById('tag-grid');
  const allTaggable=[...SUPPORT_AGENTS,...CS_AGENTS,CLIENT_TAG];
  grid.innerHTML=allTaggable.map(t=>{
    const bg=t===CLIENT_TAG?'#475569':agentColor(t);
    const isCS=CS_AGENTS.includes(t);
    const label=isCS?t+' (CS)':t;
    return`<span class="tag-chip" data-tag="${t}" style="background:${bg}" title="${EMAIL_MAP[t]||t}">${label}</span>`;
  }).join('');

  grid.querySelectorAll('.tag-chip').forEach(chip=>{
    chip.addEventListener('click',()=>{
      const tag=chip.dataset.tag;
      if(selectedTags.has(tag)){selectedTags.delete(tag);chip.classList.remove('selected');}
      else{selectedTags.add(tag);chip.classList.add('selected');}
    });
  });
}

// ── Card ───────────────────────────────────────────────────────────────
const nextAgent=cur=>{const all=[...SUPPORT_AGENTS];return all[(all.indexOf(cur)+1)%all.length];};
const nextPriority=cur=>PRIORITIES[(PRIORITIES.indexOf(cur)+1)%PRIORITIES.length];

function makeCard(ticket,isNew=false){
  const{email,id}=ticket;
  const priority=ticketPriority[id]||ticket.priority;
  const agent=ticketAssignee[id]||SUPPORT_AGENTS[0];
  const cat=ticketCategory[id];
  const comments=ticketComments[id]||[];
  const isTagged=taggedTickets.has(id);
  const catOpts=CATEGORIES.map(c=>`<option value="${esc(c)}"${c===cat?' selected':''}>${esc(c)}</option>`).join('');
  const ac=agentColor(agent);

  const div=document.createElement('div');
  div.className=`card p-${priority}${isNew?' is-new':''}${isTagged?' tagged':''}`;
  div.draggable=true;div.dataset.id=id;
  div.innerHTML=`
    <div class="card-row1">
      <div class="card-title">${esc(email.subject||'(no subject)')}</div>
      <button class="pbadge pb-${priority}" data-pr="${id}">${priority}</button>
    </div>
    <div class="card-summary">${esc(email.summary||'No preview.')}</div>
    <div class="card-controls"><select class="cat-select" data-cat="${id}">${catOpts}</select></div>
    <div class="card-footer">
      <span class="card-sender" title="${esc(email.sender)}">👤 ${esc(senderName(email.sender))}</span>
      <div class="card-actions">
        <span class="card-date">${fmtDate(email.receivedDateTime)}</span>
        <button class="open-email-btn" data-oe="${id}">📧 Open</button>
        <button class="agent-badge" data-ag="${id}" style="background:${ac}" title="Click to reassign">${agent}</button>
        <button class="com-btn${comments.length?' has-comments':''}" data-oc="${id}">💬${comments.length?` <span class="com-badge">${comments.length}</span>`:''}</button>
      </div>
    </div>`;

  div.addEventListener('dragstart',e=>{e.dataTransfer.setData('ticketId',id);setTimeout(()=>div.classList.add('dragging'),0);});
  div.addEventListener('dragend',()=>div.classList.remove('dragging'));
  div.querySelector('[data-pr]').addEventListener('click',e=>{e.stopPropagation();ticketPriority[id]=nextPriority(priority);saveState();renderBoard();});
  div.querySelector('[data-ag]').addEventListener('click',e=>{e.stopPropagation();ticketAssignee[id]=nextAgent(agent);saveState();updateWorkload();renderBoard();});
  div.querySelector('[data-cat]').addEventListener('change',e=>{ticketCategory[id]=e.target.value;saveState();});
  div.querySelector('[data-oe]').addEventListener('click',ev=>{ev.stopPropagation();openEmailModal(ticket);});
  div.querySelector('[data-oc]').addEventListener('click',ev=>{ev.stopPropagation();openComModal(ticket);});
  return div;
}

// ── Board ──────────────────────────────────────────────────────────────
function renderBoard(){
  allTickets.sort((a,b)=>{const ta=new Date(a.email.receivedDateTime||0).getTime(),tb=new Date(b.email.receivedDateTime||0).getTime();return sortDesc?tb-ta:ta-tb;});
  rebuildTagged();
  ['new','inp','res'].forEach(col=>{
    const tickets=allTickets.filter(t=>{
      const p=ticketPriority[t.id]||t.priority;
      if(activeP!=='all'&&p!==activeP)return false;
      if(activeA==='tagged')return taggedTickets.has(t.id);
      if(activeA!=='all'&&ticketAssignee[t.id]!==activeA)return false;
      return(ticketState[t.id]||'new')===col;
    });
    const el=document.getElementById('col-'+col);
    const icons={new:'📭',inp:'🚧',res:'🎉'};
    el.innerHTML='';
    if(!tickets.length)el.innerHTML=`<div class="empty"><div class="empty-icon">${icons[col]}</div>No tickets</div>`;
    else tickets.forEach(t=>el.appendChild(makeCard(t)));
    document.getElementById('badge-'+col).textContent=tickets.length;
  });
  updateWorkload();
}

// ── Sort ───────────────────────────────────────────────────────────────
document.getElementById('sort-desc').addEventListener('click',()=>{sortDesc=true;document.getElementById('sort-desc').classList.add('active');document.getElementById('sort-asc').classList.remove('active');renderBoard();});
document.getElementById('sort-asc').addEventListener('click',()=>{sortDesc=false;document.getElementById('sort-asc').classList.add('active');document.getElementById('sort-desc').classList.remove('active');renderBoard();});

// ── Drag & drop ────────────────────────────────────────────────────────
document.querySelectorAll('.col-body').forEach(col=>{
  col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
  col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
  col.addEventListener('drop',e=>{e.preventDefault();col.classList.remove('drag-over');const id=e.dataTransfer.getData('ticketId');if(id){ticketState[id]=col.dataset.col;saveState();renderBoard();}});
});

// ── Filters ────────────────────────────────────────────────────────────
document.querySelectorAll('[data-pf]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-pf]').forEach(x=>x.classList.remove('active'));b.classList.add('active');activeP=b.dataset.pf;renderBoard();}));
document.getElementById('agent-filter').addEventListener('change',e=>{activeA=e.target.value;renderBoard();});
document.getElementById('current-user').addEventListener('change',renderBoard);
document.querySelectorAll('[data-close]').forEach(b=>{b.addEventListener('click',()=>document.getElementById(b.dataset.close).classList.remove('open'));});
document.querySelectorAll('.modal-bg').forEach(bg=>{bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('open');});});

// ── Email modal ────────────────────────────────────────────────────────
async function openEmailModal(ticket){
  const{email,id}=ticket;
  document.getElementById('em-title').textContent=email.subject||'(no subject)';
  document.getElementById('em-meta').innerHTML=`<span><strong>From:</strong> ${esc(email.sender||'—')}</span><span><strong>Received:</strong> ${fmtDate(email.receivedDateTime)}</span><span><strong>Agent:</strong> ${ticketAssignee[id]||'—'}</span><span><strong>Category:</strong> ${ticketCategory[id]||'—'}</span>`;
  document.getElementById('em-body').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const ol=document.getElementById('em-outlook');ol.onclick=email.webLink?()=>window.open(email.webLink,'_blank'):null;ol.style.display=email.webLink?'':'none';
  document.getElementById('email-modal').classList.add('open');
  const uri=(email.uri||`mail:///messages/${email.id}`).split('?')[0]+'?owner='+encodeURIComponent(SUPPORT_BOX);
  const res=await window.cowork.callMcpTool(READ_TOOL,{uri});
  if(res.isError){document.getElementById('em-body').innerHTML=`<p style="color:#64748b;font-style:italic">${esc(email.summary||'No preview.')}</p>`;return;}
  const sc=res.structuredContent;let body='';
  if(sc){body=sc.body?.content||sc.bodyPreview||sc.preview||'';if((sc.body?.contentType||'').toLowerCase()==='html'){body=body.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/<style[\s\S]*?<\/style>/gi,'').replace(/<a /gi,'<a target="_blank" ');}else body=body.replace(/\n/g,'<br>');}
  if(!body){const raw=(res.content||[]).map(c=>c.text||'').join('');body=raw?raw.replace(/\n/g,'<br>'):'<em style="color:#94a3b8">No content.</em>';}
  document.getElementById('em-body').innerHTML=`<div style="overflow-wrap:break-word">${body}</div>`;
}

// ── Intern com modal ───────────────────────────────────────────────────
function renderThread(id){
  const cs=ticketComments[id]||[];const el=document.getElementById('com-thread');
  if(!cs.length){el.innerHTML='<div class="no-comments">💬 No comments yet.</div>';return;}
  el.innerHTML=cs.map(c=>{
    const tagHtml=c.tags.map(t=>{const bg=t===CLIENT_TAG?'#475569':agentColor(t);return`<span class="ctag" style="background:${bg}">@${t}</span>`;}).join('');
    const bg=agentColor(c.author)||'#475569';
    return`<div class="comment-item"><div class="comment-avatar" style="background:${bg}">${esc(c.author)}</div><div class="comment-bubble"><div class="comment-header"><span class="comment-author">${esc(c.author)}</span><span class="comment-time">${fmtTime(c.ts)}</span>${tagHtml?`<div class="comment-tags">${tagHtml}</div>`:''}</div><div class="comment-text">${esc(c.text)}</div></div></div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}

function openComModal(ticket){
  const{email,id}=ticket;comTicketId=id;
  document.getElementById('com-title').textContent=email.subject||'(no subject)';
  document.getElementById('com-subtitle').textContent=`${ticketAssignee[id]||'—'} · ${ticketCategory[id]||'—'} · ${fmtDate(email.receivedDateTime)}`;
  document.getElementById('com-input').value='';
  selectedTags.clear();
  document.querySelectorAll('.tag-chip').forEach(c=>c.classList.remove('selected'));
  renderThread(id);document.getElementById('com-modal').classList.add('open');
}

document.getElementById('com-post').addEventListener('click',async()=>{
  const text=document.getElementById('com-input').value.trim();if(!text||!comTicketId)return;
  if(!ticketComments[comTicketId])ticketComments[comTicketId]=[];
  const tags=[...selectedTags];
  const author=currentUser();
  ticketComments[comTicketId].push({author,text,tags,ts:Date.now()});
  document.getElementById('com-input').value='';selectedTags.clear();
  document.querySelectorAll('.tag-chip').forEach(c=>c.classList.remove('selected'));
  saveState();renderThread(comTicketId);renderBoard();

  if(tags.length){
    const taggedNames=tags.filter(t=>t!==CLIENT_TAG);
    showToast('💬 Posted · Tagged: '+tags.join(', ')+(TEAMS_WEBHOOK?' · Notifying Teams…':''));
    // Fire Teams notification
    const ticket=allTickets.find(t=>t.id===comTicketId);
    if(ticket)await notifyTeams(tags,text,ticket.email.subject||'(no subject)',author);
  }
});

// ── Add tickets ────────────────────────────────────────────────────────
function addTickets(emails){
  let n=0;
  emails.filter(e=>e.id&&!seen[e.id]&&!isAutomatic(e)).forEach(e=>{
    seen[e.id]=true;
    const t={id:e.id,email:e,priority:classifyPriority(e)};
    if(!ticketCategory[e.id])ticketCategory[e.id]=classifyCategory(e);
    if(!ticketAssignee[e.id]){
      const load=Object.fromEntries(SUPPORT_AGENTS.map(a=>[a,allTickets.filter(x=>ticketAssignee[x.id]===a).length]));
      ticketAssignee[e.id]=SUPPORT_AGENTS.reduce((m,a)=>load[a]<load[m]?a:m,SUPPORT_AGENTS[0]);
    }
    allTickets.push(t);n++;
  });
  return n;
}

// ── Poll ───────────────────────────────────────────────────────────────
async function poll(){
  const after=isoMinsAgo(POLL_WIN_MINS);
  const res=await window.cowork.callMcpTool(SEARCH_TOOL,{limit:20,afterDateTime:after,mailboxOwnerEmail:SUPPORT_BOX});
  const n=addTickets(extractEmails(res));
  document.getElementById('last-poll').textContent='Checked: '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  if(n>0){saveState();showToast('🔔 '+n+' new ticket'+(n>1?'s':'')+' arrived!');renderBoard();}
  startCountdown();
}

// ── Main ───────────────────────────────────────────────────────────────
(async()=>{
  buildAgentUI();
  loadState();
  document.getElementById('fstats').textContent='Fetching latest emails…';

  const[recentRes,weekRes]=await Promise.all([
    window.cowork.callMcpTool(SEARCH_TOOL,{limit:50,mailboxOwnerEmail:SUPPORT_BOX}),
    window.cowork.callMcpTool(SEARCH_TOOL,{limit:50,afterDateTime:isoDaysAgo(7),mailboxOwnerEmail:SUPPORT_BOX})
  ]);
  const raw=[...extractEmails(recentRes),...extractEmails(weekRes)];
  const deduped=[...new Map(raw.filter(e=>e.id).map(e=>[e.id,e])).values()];
  deduped.sort((a,b)=>new Date(b.receivedDateTime||0)-new Date(a.receivedDateTime||0));

  const total=addTickets(deduped);
  const unassigned=allTickets.filter(t=>!ticketAssignee[t.id]);
  if(unassigned.length){
    const load=Object.fromEntries(SUPPORT_AGENTS.map(a=>[a,0]));
    Object.values(ticketAssignee).forEach(a=>{if(a in load)load[a]++;});
    unassigned.forEach(t=>{const agent=SUPPORT_AGENTS.reduce((m,a)=>load[a]<load[m]?a:m,SUPPORT_AGENTS[0]);ticketAssignee[t.id]=agent;load[agent]++;});
    saveState();
  }

  const filtered=deduped.length-total,newest=allTickets[0]?.email?.receivedDateTime;
  document.getElementById('fstats').textContent=`${total} tickets · ${filtered} automated excluded · most recent: ${newest?fmtDate(newest):'—'}`;
  document.getElementById('meta').textContent=`${total} tickets · polling every ${POLL_SECS}s`;
  renderBoard();startCountdown();
  setInterval(poll,POLL_SECS*1000);
})();
</script>
