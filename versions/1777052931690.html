<!DOCTYPE html>
<script type="application/json" id="cowork-artifact-meta">
{
  "name": "Outlook Support Kanban",
  "schemaVersion": 1,
  "description": "Live Kanban board that pulls emails from Outlook, filters out no-reply/automated senders, and classifies each email as a support ticket with priority, category, sender, and date. Columns: New → In Progress → Resolved.",
  "mcpTools": [
    "mcp__5e170d94-d04a-4d6f-be72-371547a2bf8b__outlook_email_search",
    "mcp__5e170d94-d04a-4d6f-be72-371547a2bf8b__read_resource"
  ],
  "mcpServerNames": [
    "Microsoft 365",
    "Microsoft 365"
  ]
}
</script>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Support Kanban — Quinta</title>
<style>
:root{color-scheme:light;--purple:#5b21b6;--yellow:#92400e;--green:#065f46;--red:#b91c1c;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;}

/* HEADER */
header{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.header-left h1{font-size:17px;font-weight:700;display:flex;align-items:center;gap:7px;}
.meta{font-size:11px;color:#64748b;margin-top:2px;}

/* AGENT WORKLOAD */
.agents-bar{display:flex;gap:8px;flex-wrap:wrap;}
.agent-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;cursor:default;}
.agent-pill .count{font-size:16px;font-weight:800;}
.a-SGU{background:#ede9fe;color:#5b21b6;}
.a-SHE{background:#dbeafe;color:#1d4ed8;}
.a-ZIO{background:#d1fae5;color:#065f46;}
.a-AHK{background:#ffedd5;color:#c2410c;}

/* FILTER BAR */
.filter-bar{background:#fff;border-bottom:1px solid #f1f5f9;padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:12px;color:#64748b;font-weight:600;margin-right:2px;}
.chip{font-size:11px;padding:3px 10px;border-radius:999px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;color:#475569;transition:all .15s;}
.chip.active{background:#4f46e5;color:#fff;border-color:#4f46e5;}
.sep{width:1px;background:#e2e8f0;margin:0 4px;align-self:stretch;}

/* BOARD */
.board{display:flex;gap:14px;padding:16px 20px;overflow-x:auto;min-height:calc(100vh - 145px);}
.column{flex:1;min-width:270px;max-width:370px;display:flex;flex-direction:column;}
.col-header{padding:11px 14px;border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:13px;}
.col-new .col-header{background:#ede9fe;color:#5b21b6;}
.col-inp .col-header{background:#fef3c7;color:#92400e;}
.col-res .col-header{background:#d1fae5;color:#065f46;}
.col-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:rgba(0,0,0,.12);}
.col-body{background:#e4e6ed;border-radius:0 0 10px 10px;padding:8px;flex:1;display:flex;flex-direction:column;gap:7px;min-height:180px;transition:background .15s;}
.col-body.drag-over{background:#c7d2fe;}

/* CARD */
.card{background:#fff;border-radius:8px;padding:11px 13px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:grab;border-left:3px solid #e2e8f0;transition:box-shadow .15s,transform .15s;user-select:none;}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,.12);transform:translateY(-1px);}
.card.dragging{opacity:.4;}
.card.p-High{border-left-color:#ef4444;}
.card.p-Medium{border-left-color:#f59e0b;}
.card.p-Low{border-left-color:#10b981;}

.card-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px;}
.card-title{font-size:12.5px;font-weight:600;color:#1e293b;line-height:1.4;flex:1;cursor:pointer;}
.card-title:hover{color:#4f46e5;text-decoration:underline;}
.pbadge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:999px;flex-shrink:0;}
.pb-High{background:#fee2e2;color:#b91c1c;}
.pb-Medium{background:#fef3c7;color:#92400e;}
.pb-Low{background:#d1fae5;color:#065f46;}

.card-summary{font-size:11px;color:#64748b;line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.card-controls{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:7px;}
.cat-select{font-size:10px;border:1px solid #e2e8f0;border-radius:5px;padding:2px 5px;color:#475569;background:#f8fafc;cursor:pointer;max-width:140px;}
.cat-select:focus{outline:none;border-color:#4f46e5;}

.card-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.card-sender{font-size:10.5px;color:#4f46e5;font-weight:500;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-date{font-size:10px;color:#94a3b8;}
.agent-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;cursor:pointer;transition:opacity .15s;border:none;outline:none;}
.agent-badge:hover{opacity:.75;}
.open-btn{font-size:10px;color:#4f46e5;background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;}

/* EMPTY / LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;color:#94a3b8;gap:10px;}
.spinner{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#4f46e5;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:28px 14px;color:#94a3b8;font-size:12px;}
.empty-icon{font-size:26px;margin-bottom:7px;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:12px;width:min(680px,94vw);max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-head{padding:16px 20px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.modal-head h2{font-size:15px;font-weight:700;color:#1e293b;flex:1;line-height:1.4;}
.modal-close{font-size:20px;background:none;border:none;cursor:pointer;color:#94a3b8;line-height:1;padding:0 2px;}
.modal-close:hover{color:#1e293b;}
.modal-meta{padding:10px 20px;background:#f8fafc;border-bottom:1px solid #f1f5f9;display:flex;gap:16px;flex-wrap:wrap;}
.modal-meta span{font-size:11.5px;color:#64748b;}
.modal-meta strong{color:#1e293b;}
.modal-body{padding:18px 20px;overflow-y:auto;flex:1;font-size:13px;line-height:1.7;color:#374151;}
.modal-body .loading{height:100px;}
.modal-actions{padding:12px 20px;border-top:1px solid #f1f5f9;display:flex;gap:8px;justify-content:flex-end;}
.btn-outline{font-size:12px;padding:6px 14px;border-radius:7px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;color:#475569;}
.btn-outline:hover{background:#f1f5f9;}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>📋 Support Kanban <span style="font-size:12px;font-weight:400;color:#94a3b8;">support@quinta.im</span></h1>
    <div class="meta" id="meta">Loading emails…</div>
  </div>
  <div class="agents-bar" id="agents-bar">
    <div class="agent-pill a-SGU"><span>SGU</span><span class="count" id="load-SGU">–</span></div>
    <div class="agent-pill a-SHE"><span>SHE</span><span class="count" id="load-SHE">–</span></div>
    <div class="agent-pill a-ZIO"><span>ZIO</span><span class="count" id="load-ZIO">–</span></div>
    <div class="agent-pill a-AHK"><span>AHK</span><span class="count" id="load-AHK">–</span></div>

<div class="filter-bar">
  <span class="filter-label">Priority:</span>
  <button class="chip active" data-pfilter="all">All</button>
  <button class="chip" data-pfilter="High">🔴 High</button>
  <button class="chip" data-pfilter="Medium">🟡 Med</button>
  <button class="chip" data-pfilter="Low">🟢 Low</button>
  <div class="sep"></div>
  <span class="filter-label">Agent:</span>
  <button class="chip active" data-afilter="all">All</button>
  <button class="chip a-SGU" style="font-weight:700;" data-afilter="SGU">SGU</button>
  <button class="chip a-SHE" style="font-weight:700;" data-afilter="SHE">SHE</button>
  <button class="chip a-ZIO" style="font-weight:700;" data-afilter="ZIO">ZIO</button>
  <button class="chip a-AHK" style="font-weight:700;" data-afilter="AHK">AHK</button>
</div>

<div class="board">
  <div class="column col-new">
    <div class="col-header">📥 New <span class="col-badge" id="badge-new">0</span></div>
    <div class="col-body" id="col-new" data-col="new"><div class="loading"><div class="spinner"></div><span>Fetching…</span></div></div>

    <div class="col-header">⚙️ In Progress <span class="col-badge" id="badge-inp">0</span></div>

    <div class="col-header">✅ Resolved <span class="col-badge" id="badge-res">0</span></div>
    <div class="col-body" id="col-res" data-col="res"><div class="empty"><div class="empty-icon">🎉</div>Drag tickets here</div></div>
  </div>
</div>

<!-- EMAIL MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">Email</h2>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-body" id="modal-body"><div class="loading"><div class="spinner"></div></div></div>
    <div class="modal-actions">
      <button class="btn-outline" id="modal-close2">Close</button>
      <button class="btn-outline" id="modal-outlook" onclick="">Open in Outlook ↗</button>
    </div>
  </div>
</div>

<script>
const SEARCH_TOOL = 'mcp__5e170d94-d04a-4d6f-be72-371547a2bf8b__outlook_email_search';
const READ_TOOL   = 'mcp__5e170d94-d04a-4d6f-be72-371547a2bf8b__read_resource';
const SUPPORT_BOX = 'support@quinta.im';
const AGENTS      = ['SGU','SHE','ZIO','AHK'];
const CATEGORIES  = ['Technical failure','Bug Velma','RYA','Connectivity request','Other'];

const AGENT_COLORS = { SGU:'a-SGU', SHE:'a-SHE', ZIO:'a-ZIO', AHK:'a-AHK' };

const NO_REPLY = ['noreply','no-reply','donotreply','notifications@','alerts@','googlealerts',
  'executiveassistant@','atlassian@','linkedin.com','read.ai','@e.read','ollama.com',
  'businessprofile','mailer-daemon','postmaster','newsletter'];

const HIGH_KW = ['urgent','asap','critical','emergency','broken','not working','down','error',
  'failure','immediately','bloqué','bloquant','cannot','can\'t','unable'];
const LOW_KW  = ['newsletter','recap','weekly','digest','fyi','update'];

// State
const ticketState    = {}; // id → 'new'|'inp'|'res'
const ticketAssignee = {}; // id → agent trigram
const ticketCategory = {}; // id → category string
let allTickets   = [];
let activeP      = 'all';
let activeA      = 'all';

/* ── Parsers ── */
function parseJsonStream(text) {
  const results = []; let depth=0,start=-1,inStr=false,esc=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(esc){esc=false;continue;}
    if(c==='\\'&&inStr){esc=true;continue;}
    if(c==='"'){inStr=!inStr;continue;}
    if(inStr)continue;
    if(c==='{'){if(depth===0)start=i;depth++;}
    else if(c==='}'){depth--;if(depth===0&&start!==-1){try{results.push(JSON.parse(text.slice(start,i+1)));}catch(e){}start=-1;}}
  }
  return results;
}

function extractEmails(result) {
  if(!result||result.isError)return [];
  if(Array.isArray(result.structuredContent))return result.structuredContent;
  if(result.structuredContent&&typeof result.structuredContent==='object'){
    const arr=Object.values(result.structuredContent).find(v=>Array.isArray(v));
    if(arr)return arr;
  }
  const raw=(result.content||[]).map(c=>c.text||'').join('');
  if(raw.trim().startsWith('['))try{return JSON.parse(raw);}catch(e){}
  return parseJsonStream(raw);
}

/* ── Helpers ── */
function isNoReply(s){
  if(!s)return true;
  const l=s.toLowerCase();
  if(l===SUPPORT_BOX)return true;
  return NO_REPLY.some(p=>l.includes(p));
}

function classifyPriority(email){
  const t=((email.subject||'')+' '+(email.summary||'')).toLowerCase();
  if(HIGH_KW.some(k=>t.includes(k))||email.importance==='high')return 'High';
  if(LOW_KW.some(k=>t.includes(k)))return 'Low';
  return 'Medium';
}

function classifyCategory(email){
  const t=((email.subject||'')+' '+(email.summary||'')).toLowerCase();
  if(/connect|connectivity|integr|pms|channel|webhook|api/.test(t))return 'Connectivity request';
  if(/velma|velma bug|chatbot/.test(t))return 'Bug Velma';
  if(/technical|techniq|technical failure|down|not working|broken|error|fail/.test(t))return 'Technical failure';
  if(/rya|rethink|wrong answer|incorrect/.test(t))return 'RYA';
  return 'Other';
}

function autoAssign(tickets){
  // Load-balanced: assign to agent with fewest tickets
  const load=Object.fromEntries(AGENTS.map(a=>[a,0]));
  tickets.forEach(t=>{
    const agent=AGENTS.reduce((min,a)=>load[a]<load[min]?a:min,AGENTS[0]);
    ticketAssignee[t.id]=ticketAssignee[t.id]||agent;
    load[ticketAssignee[t.id]]=(load[ticketAssignee[t.id]]||0)+1;
  });
}

function fmtDate(iso){
  if(!iso)return '';
  const d=new Date(iso);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}

function senderName(s){
  if(!s)return 'Unknown';
  if(s.startsWith('/O=')){const m=s.match(/CN=([^/]+)$/i);return m?m[1]:s;}
  const m=s.match(/^(.+?)@/);
  return m?m[1].replace(/[._]/g,' '):s;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── Update workload display ── */
function updateWorkload(){
  const load=Object.fromEntries(AGENTS.map(a=>[a,0]));
  allTickets.forEach(t=>{
    const a=ticketAssignee[t.id];
    if(a)load[a]++;
  });
  AGENTS.forEach(a=>{ const el=document.getElementById('load-'+a); if(el)el.textContent=load[a]; });
}

/* ── Card ── */
function nextAgent(current){
  const i=AGENTS.indexOf(current);
  return AGENTS[(i+1)%AGENTS.length];
}

function makeCard(ticket){
  const {email,priority,id}=ticket;
  const agent=ticketAssignee[id]||AGENTS[0];
  const cat=ticketCategory[id]||classifyCategory(email);
  ticketCategory[id]=cat;

  const div=document.createElement('div');
  div.className=`card p-${priority}`;
  div.draggable=true;
  div.dataset.id=id;
  div.dataset.priority=priority;

  // Category options
  const catOptions=CATEGORIES.map(c=>`<option value="${esc(c)}"${c===cat?' selected':''}>${esc(c)}</option>`).join('');

  div.innerHTML=`
    <div class="card-row1">
      <div class="card-title" data-open="${id}">${esc(email.subject||'(no subject)')}</div>
      <span class="pbadge pb-${priority}">${priority}</span>
    </div>
    <div class="card-summary">${esc(email.summary||'No preview available.')}</div>
    <div class="card-controls">
      <select class="cat-select" data-catid="${id}">${catOptions}</select>
    </div>
    <div class="card-footer">
      <span class="card-sender" title="${esc(email.sender)}">👤 ${esc(senderName(email.sender))}</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <span class="card-date">${fmtDate(email.receivedDateTime)}</span>
        <button class="agent-badge a-${agent}" data-agentid="${id}" title="Click to reassign">${agent}</button>
        <button class="open-btn" data-open="${id}">📧 Open</button>
      </div>
    </div>`;

  // Drag
  div.addEventListener('dragstart',e=>{e.dataTransfer.setData('ticketId',id);setTimeout(()=>div.classList.add('dragging'),0);});
  div.addEventListener('dragend',()=>div.classList.remove('dragging'));

  // Reassign agent on click
  div.querySelector(`[data-agentid="${id}"]`).addEventListener('click',e=>{
    e.stopPropagation();
    ticketAssignee[id]=nextAgent(ticketAssignee[id]||AGENTS[0]);
    updateWorkload();
    renderBoard();
  });

  // Category change
  div.querySelector(`[data-catid="${id}"]`).addEventListener('change',e=>{
    ticketCategory[id]=e.target.value;
  });

  // Open email
  div.querySelectorAll(`[data-open="${id}"]`).forEach(el=>el.addEventListener('click',ev=>{
    ev.stopPropagation();
    openModal(ticket);
  }));

  return div;
}

/* ── Board ── */
function renderBoard(){
  const cols={new:[],inp:[],res:[]};
  for(const t of allTickets){
    if(activeP!=='all'&&t.priority!==activeP)continue;
    const a=ticketAssignee[t.id];
    if(activeA!=='all'&&a!==activeA)continue;
    cols[ticketState[t.id]||'new'].push(t);
  }
  const icons={new:'📭',inp:'🚧',res:'🎉'};
  const labels={new:'No tickets',inp:'Drag tickets here',res:'Drag tickets here'};
  for(const [col,tickets] of Object.entries(cols)){
    const el=document.getElementById('col-'+col);
    el.innerHTML='';
    if(!tickets.length){
      el.innerHTML=`<div class="empty"><div class="empty-icon">${icons[col]}</div>${labels[col]}</div>`;
    } else {
      tickets.forEach(t=>el.appendChild(makeCard(t)));
    }
    document.getElementById('badge-'+col).textContent=tickets.length;
  }
  updateWorkload();
}

function setupDrop(){
  document.querySelectorAll('.col-body').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{
      e.preventDefault();col.classList.remove('drag-over');
      const id=e.dataTransfer.getData('ticketId');
      if(id){ticketState[id]=col.dataset.col;renderBoard();}
    });
  });
}

function setupFilters(){
  document.querySelectorAll('[data-pfilter]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('[data-pfilter]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');activeP=btn.dataset.pfilter;renderBoard();
    });
  });
  document.querySelectorAll('[data-afilter]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('[data-afilter]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');activeA=btn.dataset.afilter;renderBoard();
    });
  });
}

/* ── Email Modal ── */
const modalBg    = document.getElementById('modal-bg');
const modalTitle = document.getElementById('modal-title');
const modalMeta  = document.getElementById('modal-meta');
const modalBody  = document.getElementById('modal-body');
const modalOtlk  = document.getElementById('modal-outlook');

function closeModal(){modalBg.classList.remove('open');}
document.getElementById('modal-close').addEventListener('click',closeModal);
document.getElementById('modal-close2').addEventListener('click',closeModal);
modalBg.addEventListener('click',e=>{if(e.target===modalBg)closeModal();});

async function openModal(ticket){
  const {email,id}=ticket;
  modalTitle.textContent=email.subject||'(no subject)';
  modalMeta.innerHTML=`
    <span><strong>From:</strong> ${esc(email.sender||'—')}</span>
    <span><strong>Date:</strong> ${fmtDate(email.receivedDateTime)}</span>
    <span><strong>Assigned:</strong> ${ticketAssignee[id]||'—'}</span>
    <span><strong>Category:</strong> ${ticketCategory[id]||'—'}</span>`;
  modalBody.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  if(email.webLink){
    modalOtlk.onclick=()=>window.open(email.webLink,'_blank');
    modalOtlk.style.display='';
  } else {
    modalOtlk.style.display='none';
  }
  modalBg.classList.add('open');

  // Build URI with owner param for shared mailbox
  const uri=(email.uri||`mail:///messages/${email.id}`).split('?')[0]+'?owner='+encodeURIComponent(SUPPORT_BOX);
  const result=await window.cowork.callMcpTool(READ_TOOL,{uri});

  if(result.isError){
    // Fallback: show summary we already have
    modalBody.innerHTML=`<p style="color:#64748b;font-style:italic;">${esc(email.summary||'No preview available.')}</p>`;
    return;
  }

  // Extract body from structuredContent or content text
  let bodyHtml='';
  const sc=result.structuredContent;
  if(sc){
    bodyHtml=sc.body?.content||sc.bodyPreview||sc.preview||'';
    const contentType=sc.body?.contentType||'';
    if(contentType.toLowerCase()==='html'){
      // Render HTML safely by stripping scripts/styles but keeping structure
      bodyHtml=bodyHtml.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/<style[\s\S]*?<\/style>/gi,'');
    } else {
      bodyHtml=bodyHtml.replace(/\n/g,'<br>');
    }
  }
  if(!bodyHtml){
    const raw=(result.content||[]).map(c=>c.text||'').join('');
    bodyHtml=raw?raw.replace(/\n/g,'<br>'):'<em style="color:#94a3b8">No body content available.</em>';
  }

  modalBody.innerHTML=`<div style="max-width:100%;overflow-wrap:break-word;">${bodyHtml||'<em style="color:#94a3b8">Empty email.</em>'}</div>`;
}

/* ── Main ── */
(async()=>{
  setupDrop();
  setupFilters();

  // Fetch two batches in parallel for more coverage
  const [r1,r2]=await Promise.all([
    window.cowork.callMcpTool(SEARCH_TOOL,{limit:50,afterDateTime:'last 60 days',mailboxOwnerEmail:SUPPORT_BOX}),
    window.cowork.callMcpTool(SEARCH_TOOL,{limit:50,afterDateTime:'last 60 days',mailboxOwnerEmail:SUPPORT_BOX,offset:50})
  ]);

  const raw=[...extractEmails(r1),...extractEmails(r2)];

  // Deduplicate by id
  const seen=new Set();
  const emails=raw.filter(e=>{
    if(!e.id||seen.has(e.id))return false;
    seen.add(e.id);
    return !isNoReply(e.sender)&&(e.subject||e.summary);
  });

  allTickets=emails.map((e,i)=>({
    id: e.id||String(i),
    email: e,
    priority: classifyPriority(e),
    uri: e.uri||null
  }));

  // Auto-assign (load-balanced)
  autoAssign(allTickets);
  // Pre-classify categories
  allTickets.forEach(t=>{ticketCategory[t.id]=classifyCategory(t.email);});

  document.getElementById('meta').textContent=
    `${allTickets.length} client ticket${allTickets.length!==1?'s':''} · support@quinta.im · last 60 days · reload to refresh`;

  renderBoard();
})();
</script>
</body>
