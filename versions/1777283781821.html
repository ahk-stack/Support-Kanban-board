<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Support Kanban — Quinta</title>
<style>
:root{color-scheme:light;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;}

/* ── HEADER ── */
header{background:#fff;border-bottom:1px solid #e2e8f0;padding:11px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.header-left h1{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px;}
.header-left h1 small{font-size:11px;font-weight:400;color:#94a3b8;}
.meta{font-size:11px;color:#64748b;margin-top:2px;display:flex;align-items:center;gap:7px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.agents-bar{display:flex;gap:6px;}
.agent-pill{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:7px;font-size:12px;font-weight:600;}
.agent-pill .cnt{font-size:15px;font-weight:800;}
.a-SGU{background:#ede9fe;color:#5b21b6;}
.a-SHE{background:#dbeafe;color:#1d4ed8;}
.a-ZIO{background:#d1fae5;color:#065f46;}
.a-AHK{background:#ffedd5;color:#c2410c;}
.a-CS {background:#fce7f3;color:#9d174d;}
.a-CLIENT{background:#f1f5f9;color:#475569;}

/* Current user selector */
.user-sel{display:flex;align-items:center;gap:6px;padding:5px 10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;}
.user-sel label{font-size:11px;color:#64748b;font-weight:600;white-space:nowrap;}
.user-sel select{font-size:12px;font-weight:700;border:none;background:transparent;cursor:pointer;color:#4f46e5;}
.user-sel select:focus{outline:none;}

/* ── TOAST ── */
#toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:9px 20px;border-radius:999px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transition:opacity .3s;pointer-events:none;}
#toast.show{opacity:1;}

/* ── FILTER BAR ── */
.filter-bar{background:#fff;border-bottom:1px solid #f1f5f9;padding:9px 18px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:11.5px;color:#64748b;font-weight:600;}
.chip{font-size:11px;padding:3px 10px;border-radius:999px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;color:#475569;transition:all .15s;}
.chip.active{background:#4f46e5;color:#fff;border-color:#4f46e5;}
.sep{width:1px;background:#e2e8f0;margin:0 3px;align-self:stretch;}
.fstats{font-size:11px;color:#94a3b8;padding:5px 18px;background:#fafafa;border-bottom:1px solid #f1f5f9;}

/* ── BOARD ── */
.board{display:flex;gap:13px;padding:14px 18px;overflow-x:auto;min-height:calc(100vh - 155px);}
.column{flex:1;min-width:265px;max-width:370px;display:flex;flex-direction:column;}
.col-header{padding:10px 14px;border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:13px;}
.col-new .col-header{background:#ede9fe;color:#5b21b6;}
.col-inp .col-header{background:#fef3c7;color:#92400e;}
.col-res .col-header{background:#d1fae5;color:#065f46;}
.col-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:rgba(0,0,0,.12);}
.col-body{background:#e4e6ed;border-radius:0 0 10px 10px;padding:8px;flex:1;display:flex;flex-direction:column;gap:7px;min-height:180px;transition:background .15s;}
.col-body.drag-over{background:#c7d2fe;}

/* ── CARD ── */
.card{background:#fff;border-radius:8px;padding:11px 12px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:grab;border-left:3px solid #e2e8f0;transition:box-shadow .15s,transform .15s;user-select:none;}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,.12);transform:translateY(-1px);}
.card.dragging{opacity:.4;}
.card.p-High{border-left-color:#ef4444;}
.card.p-Medium{border-left-color:#f59e0b;}
.card.p-Low{border-left-color:#10b981;}
.card.tagged{box-shadow:0 0 0 2px #4f46e5,0 4px 14px rgba(79,70,229,.2);}
.card.is-new{animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

.card-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px;}
.card-title{font-size:12.5px;font-weight:600;color:#1e293b;line-height:1.4;flex:1;cursor:pointer;}
.card-title:hover{color:#4f46e5;text-decoration:underline;}
.pbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;flex-shrink:0;cursor:pointer;border:none;outline:none;}
.pbadge:hover{opacity:.75;}
.pb-High{background:#fee2e2;color:#b91c1c;}
.pb-Medium{background:#fef3c7;color:#92400e;}
.pb-Low{background:#d1fae5;color:#065f46;}

.card-summary{font-size:11px;color:#64748b;line-height:1.5;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-controls{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:7px;}
.cat-select{font-size:10px;border:1px solid #e2e8f0;border-radius:5px;padding:2px 5px;color:#475569;background:#f8fafc;cursor:pointer;flex:1;min-width:0;}
.cat-select:focus{outline:none;border-color:#4f46e5;}

.card-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.card-sender{font-size:10.5px;color:#4f46e5;font-weight:500;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-actions{display:flex;align-items:center;gap:4px;}
.agent-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;cursor:pointer;border:none;outline:none;}
.agent-badge:hover{opacity:.75;}
.icon-btn{font-size:11px;background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:4px;color:#64748b;display:flex;align-items:center;gap:3px;}
.icon-btn:hover{background:#f1f5f9;color:#1e293b;}
.com-btn{position:relative;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:6px;font-size:10.5px;font-weight:600;color:#475569;padding:2px 7px;cursor:pointer;display:flex;align-items:center;gap:4px;}
.com-btn:hover{background:#ede9fe;color:#5b21b6;border-color:#c4b5fd;}
.com-btn.has-comments{background:#ede9fe;color:#5b21b6;border-color:#c4b5fd;}
.com-badge{background:#5b21b6;color:#fff;border-radius:999px;font-size:9px;font-weight:800;padding:0 5px;line-height:16px;}
.card-date{font-size:10px;color:#94a3b8;}

/* ── LOADING / EMPTY ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:160px;color:#94a3b8;gap:10px;}
.spinner{width:26px;height:26px;border:3px solid #e2e8f0;border-top-color:#4f46e5;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:26px 14px;color:#94a3b8;font-size:12px;}
.empty-icon{font-size:24px;margin-bottom:6px;}

/* ── MODALS SHARED ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:flex-start;justify-content:center;padding-top:40px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:12px;width:min(680px,94vw);max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25);}

.modal-head h2{font-size:14px;font-weight:700;color:#1e293b;flex:1;line-height:1.4;}
.modal-close-x{font-size:18px;background:none;border:none;cursor:pointer;color:#94a3b8;}
.modal-close-x:hover{color:#1e293b;}
.modal-meta-bar{padding:9px 18px;background:#f8fafc;border-bottom:1px solid #f1f5f9;display:flex;gap:14px;flex-wrap:wrap;}
.modal-meta-bar span{font-size:11.5px;color:#64748b;}
.modal-meta-bar strong{color:#1e293b;}
.modal-body-scroll{padding:16px 18px;overflow-y:auto;flex:1;font-size:13px;line-height:1.7;color:#374151;}
.modal-actions{padding:11px 18px;border-top:1px solid #f1f5f9;display:flex;gap:8px;justify-content:flex-end;}
.btn-out{font-size:12px;padding:6px 14px;border-radius:7px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;color:#475569;}
.btn-out:hover{background:#f1f5f9;}
.btn-primary{font-size:12px;padding:6px 16px;border-radius:7px;border:none;background:#4f46e5;color:#fff;cursor:pointer;font-weight:600;}
.btn-primary:hover{background:#4338ca;}

/* ── INTERN COM MODAL ── */
#com-modal .modal{max-width:560px;}
.com-thread{display:flex;flex-direction:column;gap:12px;padding:14px 18px;overflow-y:auto;flex:1;min-height:0;}
.comment-item{display:flex;gap:10px;}
.comment-avatar{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:2px;}
.comment-bubble{flex:1;background:#f8fafc;border:1px solid #f1f5f9;border-radius:0 8px 8px 8px;padding:8px 12px;}
.comment-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
.comment-author{font-size:11.5px;font-weight:700;color:#1e293b;}
.comment-time{font-size:10px;color:#94a3b8;}
.comment-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;}
.ctag{font-size:10px;font-weight:700;padding:1px 7px;border-radius:999px;}
.ctag-agent{background:#ede9fe;color:#5b21b6;}
.ctag-cs{background:#fce7f3;color:#9d174d;}
.ctag-client{background:#f1f5f9;color:#475569;}
.comment-text{font-size:12.5px;color:#374151;line-height:1.5;white-space:pre-wrap;word-break:break-word;}
.no-comments{text-align:center;padding:30px;color:#94a3b8;font-size:12px;}

/* Compose area */
.compose-area{border-top:1px solid #e2e8f0;padding:14px 18px;display:flex;flex-direction:column;gap:10px;}
.compose-label{font-size:11.5px;font-weight:600;color:#64748b;}
.compose-textarea{width:100%;min-height:72px;border:1px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:12.5px;font-family:inherit;resize:vertical;color:#1e293b;line-height:1.5;}
.compose-textarea:focus{outline:none;border-color:#4f46e5;}
.compose-footer{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.tag-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.tag-row label{font-size:11px;font-weight:600;color:#64748b;}
.tag-chip{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;user-select:none;}
.tag-chip.selected{border-color:currentColor;opacity:1;}
.tag-chip:not(.selected){opacity:.5;}
.tag-SGU{background:#ede9fe;color:#5b21b6;}
.tag-SHE{background:#dbeafe;color:#1d4ed8;}
.tag-ZIO{background:#d1fae5;color:#065f46;}
.tag-AHK{background:#ffedd5;color:#c2410c;}
.tag-CS {background:#fce7f3;color:#9d174d;}
.tag-CLIENT{background:#f1f5f9;color:#475569;border-color:#cbd5e1!important;}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <h1>📋 Support Kanban <small>support@quinta.im</small></h1>
    <div class="meta"><span class="live-dot"></span><span id="meta">Loading…</span></div>
  </div>
  <div class="header-right">

      <label>🧑 You:</label>
      <select id="current-user">

      <div class="agent-pill a-ZIO">ZIO <span class="cnt" id="load-ZIO">–</span></div>

<!-- FILTERS -->

  <button class="chip" data-pf="Low">🟢 Low</button>
  <div class="sep"></div>
  <span class="filter-label">Agent:</span>
  <button class="chip active" data-af="all">All</button>
  <button class="chip a-SGU" style="font-weight:700" data-af="SGU">SGU</button>
  <button class="chip a-SHE" style="font-weight:700" data-af="SHE">SHE</button>
  <button class="chip a-ZIO" style="font-weight:700" data-af="ZIO">ZIO</button>

<!-- BOARD -->

  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- EMAIL MODAL -->
<div class="modal-bg" id="email-modal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="em-title"></h2>
      <button class="modal-close-x" data-close="email-modal">✕</button>
    </div>
    <div class="modal-meta-bar" id="em-meta"></div>

<!-- INTERN COM MODAL -->
<div class="modal-bg" id="com-modal">
  <div class="modal" style="max-width:540px;">
    <div class="modal-head">
      <div style="flex:1;min-width:0;">
        <h2 id="com-title"></h2>
        <div style="font-size:11px;color:#94a3b8;margin-top:3px;" id="com-subtitle"></div>
      </div>

<script>
// ── Constants ─────────────────────────────────────────────────────────
const SEARCH_TOOL = 'mcp__5e170d94-d04a-4d6f-be72-371547a2bf8b__outlook_email_search';
const READ_TOOL   = 'mcp__5e170d94-d04a-4d6f-be72-371547a2bf8b__read_resource';
const SUPPORT_BOX = 'support@quinta.im';
const AGENTS      = ['SGU','SHE','ZIO','AHK'];
const ALL_TAGS    = ['SGU','SHE','ZIO','AHK','CS','CLIENT'];
const CATEGORIES  = ['Technical failure','Bug Velma','RYA','Connectivity request','Other'];
const PRIORITIES  = ['High','Medium','Low'];

const AGENT_COLOR = {SGU:'a-SGU',SHE:'a-SHE',ZIO:'a-ZIO',AHK:'a-AHK',CS:'a-CS',CLIENT:'a-CLIENT'};
const TAG_TYPE    = {SGU:'agent',SHE:'agent',ZIO:'agent',AHK:'agent',CS:'cs',CLIENT:'client'};

// ── Spam patterns ─────────────────────────────────────────────────────
const SPAM_SENDER = ['noreply','no-reply','donotreply','notifications@','alerts@','mailer@',
  'newsletter@','news@','promo@','marketing@','hello@','team@','digest@','automated@','system@',
  'sendgrid','mailchimp','hubspot.com','klaviyo','googlealerts','linkedin.com','atlassian',
  'jira','github.com','dropbox.com','zoom.us','calendly','stripe.com','amazonaws','read.ai'];
const SPAM_SUBJECT = ['unsubscribe','newsletter','you are receiving','mailing list','promotional',
  'limited time','% off','free trial','weekly digest','monthly digest','release notes',
  'product update','changelog','google alert','job alert','shipment','order confirm'];

// ── State ─────────────────────────────────────────────────────────────
const seen            = new Set();
const ticketState     = {};
const ticketAssignee  = {};
const ticketCategory  = {};
const ticketPriority  = {};
const ticketComments  = {};   // id → [{author,text,tags:[],ts}]
const taggedTickets   = new Set(); // tickets where current user is tagged
let allTickets        = [];
let lastPollTime      = new Date();
let activeP = 'all', activeA = 'all';
let comTicketId       = null; // which ticket's intern com is open
let selectedTags      = new Set();

function currentUser(){ return document.getElementById('current-user').value; }

// ── Helpers ───────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){
  if(!iso)return'';
  const d=new Date(iso),now=new Date(),diff=now-d;
  if(diff<3600000)return Math.floor(diff/60000)+'m ago';
  if(diff<86400000)return Math.floor(diff/3600000)+'h ago';
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'});}
function senderName(s){
  if(!s)return'Unknown';
  if(s.startsWith('/O=')){const m=s.match(/CN=([^/]+)$/i);return m?m[1]:s;}
  const m=s.match(/^(.+?)@/);
  return m?m[1].replace(/[._-]/g,' '):s;
}

// ── JSON parser ────────────────────────────────────────────────────────
function parseJsonStream(text){
  const r=[];let d=0,s=-1,inS=false,esc2=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(esc2){esc2=false;continue;}
    if(c==='\\'&&inS){esc2=true;continue;}
    if(c==='"'){inS=!inS;continue;}
    if(inS)continue;
    if(c==='{'){if(d===0)s=i;d++;}
    else if(c==='}'){d--;if(d===0&&s!==-1){try{r.push(JSON.parse(text.slice(s,i+1)));}catch(e){}s=-1;}}
  }
  return r;
}
function extractEmails(res){
  if(!res||res.isError)return[];
  if(Array.isArray(res.structuredContent))return res.structuredContent;
  if(res.structuredContent&&typeof res.structuredContent==='object'){
    const a=Object.values(res.structuredContent).find(v=>Array.isArray(v));if(a)return a;
  }
  const raw=(res.content||[]).map(c=>c.text||'').join('');
  if(raw.trim().startsWith('['))try{return JSON.parse(raw);}catch(e){}
  return parseJsonStream(raw);
}

// ── Spam filter ────────────────────────────────────────────────────────
function isSpamSender(s){
  if(!s)return true;
  const l=s.toLowerCase();
  if(l===SUPPORT_BOX)return true;
  return SPAM_SENDER.some(p=>l.includes(p));
}
function isSpamSubject(subj,sum){
  const t=((subj||'')+(sum||'')).toLowerCase();
  return SPAM_SUBJECT.some(p=>t.includes(p));
}
async function aiFilterEmails(emails){
  const real=[],toCheck=[];
  for(const e of emails){
    if(isSpamSender(e.sender))continue;
    if(isSpamSubject(e.subject,e.summary))continue;
    toCheck.push(e);
  }
  const chunks=[];
  for(let i=0;i<toCheck.length;i+=20)chunks.push(toCheck.slice(i,i+20));
  for(const chunk of chunks){
    const items=chunk.map((e,i)=>`[${i}] From:${e.sender||''} Subject:${e.subject||'(none)'} Preview:${(e.summary||'').slice(0,80)}`);
    const res=await window.cowork.sample('Spam classifier for hotel software support inbox. Reply ONLY with JSON array of true/false. true=real client email, false=spam/newsletter/automated. One value per email, same order.',items);
    if(!res.isError){
      try{
        const flags=JSON.parse(res.text.match(/\[[\s\S]*\]/)?.[0]||'[]');
        chunk.forEach((e,i)=>{if(flags[i]!==false)real.push(e);});
      }catch{chunk.forEach(e=>real.push(e));}
    }else chunk.forEach(e=>real.push(e));
  }
  return real;
}

// ── Classification ─────────────────────────────────────────────────────
function classifyPriority(e){
  const t=((e.subject||'')+(e.summary||'')).toLowerCase();
  if(e.importance==='high'||/urgent|asap|critical|not working|broken|error|cannot|can't|bloqué/.test(t))return'High';
  if(/info|general|question|hello|bonjour/.test(t))return'Low';
  return'Medium';
}
function classifyCategory(e){
  const t=((e.subject||'')+(e.summary||'')).toLowerCase();
  if(/connect|connectivity|integr|pms|channel|webhook|api|crm|interface/.test(t))return'Connectivity request';
  if(/velma|chatbot|bot answer/.test(t))return'Bug Velma';
  if(/rya|rethink|wrong answer/.test(t))return'RYA';
  if(/technical|down|not working|broken|error|fail/.test(t))return'Technical failure';
  return'Other';
}

// ── Auto-assign ────────────────────────────────────────────────────────
function autoAssign(tickets){
  const load=Object.fromEntries(AGENTS.map(a=>[a,0]));
  Object.values(ticketAssignee).forEach(a=>{if(load[a]!==undefined)load[a]++;});
  tickets.forEach(t=>{
    if(ticketAssignee[t.id])return;
    const agent=AGENTS.reduce((m,a)=>load[a]<load[m]?a:m,AGENTS[0]);
    ticketAssignee[t.id]=agent;load[agent]++;
  });
}
function updateWorkload(){
  const load=Object.fromEntries(AGENTS.map(a=>[a,0]));
  allTickets.forEach(t=>{const a=ticketAssignee[t.id];if(a&&load[a]!==undefined)load[a]++;});
  AGENTS.forEach(a=>{const el=document.getElementById('load-'+a);if(el)el.textContent=load[a];});
}

// ── Toast ──────────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),4500);
}

// ── Tagged tickets helper ──────────────────────────────────────────────
function rebuildTaggedSet(){
  taggedTickets.clear();
  const me=currentUser();
  Object.entries(ticketComments).forEach(([id,comments])=>{
    if(comments.some(c=>c.tags.includes(me)))taggedTickets.add(id);
  });
  // show/hide tagged filter
  const tf=document.getElementById('tagged-filter');
  tf.style.display=taggedTickets.size?'':'none';
}

// ── Render cards ───────────────────────────────────────────────────────
function nextAgent(cur){return AGENTS[(AGENTS.indexOf(cur)+1)%AGENTS.length];}
function nextPriority(cur){return PRIORITIES[(PRIORITIES.indexOf(cur)+1)%PRIORITIES.length];}

function makeCard(ticket,isNew=false){
  const{email,id}=ticket;
  const priority=ticketPriority[id]||ticket.priority;
  const agent=ticketAssignee[id]||AGENTS[0];
  const cat=ticketCategory[id];
  const comments=ticketComments[id]||[];
  const hasComments=comments.length>0;
  const isTagged=taggedTickets.has(id);

  const catOpts=CATEGORIES.map(c=>`<option value="${esc(c)}"${c===cat?' selected':''}>${esc(c)}</option>`).join('');

  const div=document.createElement('div');
  div.className=`card p-${priority}${isNew?' is-new':''}${isTagged?' tagged':''}`;
  div.draggable=true;div.dataset.id=id;

  div.innerHTML=`
    <div class="card-row1">
      <div class="card-title" data-open-email="${id}">${esc(email.subject||'(no subject)')}</div>
      <button class="pbadge pb-${priority}" data-prid="${id}">${priority}</button>
    </div>
    <div class="card-summary">${esc(email.summary||'No preview.')}</div>
    <div class="card-controls">
      <select class="cat-select" data-catid="${id}">${catOpts}</select>
    </div>
    <div class="card-footer">
      <span class="card-sender" title="${esc(email.sender)}">👤 ${esc(senderName(email.sender))}</span>
      <div class="card-actions">
        <span class="card-date">${fmtDate(email.receivedDateTime)}</span>
        <button class="agent-badge a-${agent}" data-agentid="${id}">${agent}</button>
        <button class="com-btn${hasComments?' has-comments':''}" data-open-com="${id}">
          💬 Intern com${hasComments?` <span class="com-badge">${comments.length}</span>`:''}
        </button>
      </div>
    </div>`;

  div.addEventListener('dragstart',e=>{e.dataTransfer.setData('ticketId',id);setTimeout(()=>div.classList.add('dragging'),0);});
  div.addEventListener('dragend',()=>div.classList.remove('dragging'));
  div.querySelector(`[data-prid]`).addEventListener('click',e=>{e.stopPropagation();ticketPriority[id]=nextPriority(ticketPriority[id]||ticket.priority);renderBoard();});
  div.querySelector(`[data-agentid]`).addEventListener('click',e=>{e.stopPropagation();ticketAssignee[id]=nextAgent(agent);updateWorkload();renderBoard();});
  div.querySelector(`[data-catid]`).addEventListener('change',e=>{ticketCategory[id]=e.target.value;});
  div.querySelector(`[data-open-email]`).addEventListener('click',ev=>{ev.stopPropagation();openEmailModal(ticket);});
  div.querySelector(`[data-open-com]`).addEventListener('click',ev=>{ev.stopPropagation();openComModal(ticket);});
  return div;
}

function renderBoard(){
  rebuildTaggedSet();
  const cols={new:[],inp:[],res:[]};
  for(const t of allTickets){
    const p=ticketPriority[t.id]||t.priority;
    if(activeP!=='all'&&p!==activeP)continue;
    const a=ticketAssignee[t.id];
    if(activeA==='tagged'){if(!taggedTickets.has(t.id))continue;}
    else if(activeA!=='all'&&a!==activeA)continue;
    cols[ticketState[t.id]||'new'].push(t);
  }
  ['new','inp','res'].forEach(col=>{
    const el=document.getElementById('col-'+col);
    const icons={new:'📭',inp:'🚧',res:'🎉'};
    const lbls={new:'No tickets',inp:'Drag here',res:'Drag here'};
    el.innerHTML='';
    if(!cols[col].length)el.innerHTML=`<div class="empty"><div class="empty-icon">${icons[col]}</div>${lbls[col]}</div>`;
    else cols[col].forEach(t=>el.appendChild(makeCard(t)));
    document.getElementById('badge-'+col).textContent=cols[col].length;
  });
  updateWorkload();
}

// ── Drag & drop ────────────────────────────────────────────────────────
function setupDrop(){
  document.querySelectorAll('.col-body').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{
      e.preventDefault();col.classList.remove('drag-over');
      const id=e.dataTransfer.getData('ticketId');
      if(id){ticketState[id]=col.dataset.col;renderBoard();}
    });
  });
}

// ── Filters ────────────────────────────────────────────────────────────
function setupFilters(){
  document.querySelectorAll('[data-pf]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('[data-pf]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');activeP=b.dataset.pf;renderBoard();
  }));
  document.querySelectorAll('[data-af]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('[data-af]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');activeA=b.dataset.af;renderBoard();
  }));
}

// ── Modal helpers ──────────────────────────────────────────────────────
document.querySelectorAll('[data-close]').forEach(btn=>{
  btn.addEventListener('click',()=>document.getElementById(btn.dataset.close).classList.remove('open'));
});
document.querySelectorAll('.modal-bg').forEach(bg=>{
  bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('open');});
});

// ── Email modal ────────────────────────────────────────────────────────
async function openEmailModal(ticket){
  const{email,id}=ticket;
  document.getElementById('em-title').textContent=email.subject||'(no subject)';
  document.getElementById('em-meta').innerHTML=`
    <span><strong>From:</strong> ${esc(email.sender||'—')}</span>
    <span><strong>Date:</strong> ${fmtDate(email.receivedDateTime)}</span>
    <span><strong>Agent:</strong> ${ticketAssignee[id]||'—'}</span>
    <span><strong>Category:</strong> ${ticketCategory[id]||'—'}</span>`;
  document.getElementById('em-body').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const ol=document.getElementById('em-outlook');
  ol.onclick=email.webLink?()=>window.open(email.webLink,'_blank'):null;
  ol.style.display=email.webLink?'':'none';
  document.getElementById('email-modal').classList.add('open');

  const uri=(email.uri||`mail:///messages/${email.id}`).split('?')[0]+'?owner='+encodeURIComponent(SUPPORT_BOX);
  const res=await window.cowork.callMcpTool(READ_TOOL,{uri});
  if(res.isError){document.getElementById('em-body').innerHTML=`<p style="color:#64748b;font-style:italic">${esc(email.summary||'No preview.')}</p>`;return;}
  const sc=res.structuredContent;
  let body='';
  if(sc){
    body=sc.body?.content||sc.bodyPreview||sc.preview||'';
    const ct=(sc.body?.contentType||'').toLowerCase();
    if(ct==='html'){body=body.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/<style[\s\S]*?<\/style>/gi,'').replace(/<a /gi,'<a target="_blank" ');}
    else body=body.replace(/\n/g,'<br>');
  }
  if(!body){const raw=(res.content||[]).map(c=>c.text||'').join('');body=raw?raw.replace(/\n/g,'<br>'):'<em style="color:#94a3b8">No content.</em>';}
  document.getElementById('em-body').innerHTML=`<div style="overflow-wrap:break-word">${body}</div>`;
}

// ── Intern com modal ───────────────────────────────────────────────────
function renderThread(id){
  const comments=ticketComments[id]||[];
  const thread=document.getElementById('com-thread');
  if(!comments.length){thread.innerHTML='<div class="no-comments">💬 No internal comments yet.<br>Be the first to add one.</div>';return;}
  thread.innerHTML=comments.map(c=>{
    const tagHtml=c.tags.map(t=>{
      const cls=TAG_TYPE[t]==='agent'?'ctag-agent':TAG_TYPE[t]==='cs'?'ctag-cs':'ctag-client';
      return`<span class="ctag ${cls}">@${t}</span>`;
    }).join('');
    const aColor=AGENT_COLOR[c.author]||'a-AHK';
    return`<div class="comment-item">
      <div class="comment-avatar ${aColor}">${esc(c.author)}</div>
      <div class="comment-bubble">
        <div class="comment-header">
          <span class="comment-author">${esc(c.author)}</span>
          <span class="comment-time">${fmtTime(c.ts)}</span>
          ${tagHtml?`<div class="comment-tags">${tagHtml}</div>`:''}
        </div>
        <div class="comment-text">${esc(c.text)}</div>
      </div>
    </div>`;
  }).join('');
  thread.scrollTop=thread.scrollHeight;
}

function openComModal(ticket){
  const{email,id}=ticket;
  comTicketId=id;
  document.getElementById('com-title').textContent=email.subject||'(no subject)';
  document.getElementById('com-subtitle').textContent=
    `Assigned to ${ticketAssignee[id]||'—'} · ${ticketCategory[id]||'Uncategorized'}`;
  document.getElementById('com-input').value='';
  // Reset tag chips
  selectedTags.clear();
  document.querySelectorAll('.tag-chip').forEach(c=>c.classList.remove('selected'));
  renderThread(id);
  document.getElementById('com-modal').classList.add('open');
}

// Tag chip toggle
document.querySelectorAll('.tag-chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    const tag=chip.dataset.tag;
    if(selectedTags.has(tag)){selectedTags.delete(tag);chip.classList.remove('selected');}
    else{selectedTags.add(tag);chip.classList.add('selected');}
  });
});

// Post comment
document.getElementById('com-post').addEventListener('click',()=>{
  const text=document.getElementById('com-input').value.trim();
  if(!text||!comTicketId)return;
  if(!ticketComments[comTicketId])ticketComments[comTicketId]=[];
  const tags=[...selectedTags];
  ticketComments[comTicketId].push({author:currentUser(),text,tags,ts:Date.now()});
  document.getElementById('com-input').value='';
  selectedTags.clear();
  document.querySelectorAll('.tag-chip').forEach(c=>c.classList.remove('selected'));
  renderThread(comTicketId);
  renderBoard(); // refresh card badge
  // Notify if someone was tagged
  if(tags.length){
    const names=tags.join(', ');
    showToast(`💬 Comment posted · Tagged: ${names}`);
  }
});

// Current user change → rebuild tagged set
document.getElementById('current-user').addEventListener('change',()=>{renderBoard();});

// ── Real-time polling ──────────────────────────────────────────────────
async function pollNewEmails(){
  const after=lastPollTime.toISOString();lastPollTime=new Date();
  const res=await window.cowork.callMcpTool(SEARCH_TOOL,{limit:20,afterDateTime:after,mailboxOwnerEmail:SUPPORT_BOX});
  const fresh=extractEmails(res).filter(e=>e.id&&!seen.has(e.id)&&!isSpamSender(e.sender)&&!isSpamSubject(e.subject,e.summary)&&(e.subject||e.summary));
  if(!fresh.length)return;
  fresh.forEach(e=>{
    seen.add(e.id);
    const t={id:e.id,email:e,priority:classifyPriority(e)};
    ticketCategory[e.id]=classifyCategory(e);
    const load=Object.fromEntries(AGENTS.map(a=>[a,allTickets.filter(x=>ticketAssignee[x.id]===a).length]));
    ticketAssignee[e.id]=AGENTS.reduce((m,a)=>load[a]<load[m]?a:m,AGENTS[0]);
    allTickets.unshift(t);
  });
  showToast(`🔔 ${fresh.length} new ticket${fresh.length>1?'s':''} arrived`);
  renderBoard();
}

// ── Main ───────────────────────────────────────────────────────────────
(async()=>{
  setupDrop();setupFilters();

  const results=await Promise.all(
    [0,50,100,150,200].map(offset=>
      window.cowork.callMcpTool(SEARCH_TOOL,{limit:50,afterDateTime:'last 90 days',mailboxOwnerEmail:SUPPORT_BOX,offset})
    )
  );
  const raw=results.flatMap(extractEmails);
  const deduped=[...new Map(raw.filter(e=>e.id).map(e=>[e.id,e])).values()];
  deduped.forEach(e=>seen.add(e.id));
  document.getElementById('fstats').textContent=`${deduped.length} emails fetched · running AI spam filter…`;

  const clientEmails=await aiFilterEmails(deduped);
  document.getElementById('fstats').textContent=
    `${clientEmails.length} client tickets · ${deduped.length-clientEmails.length} spam/newsletters excluded · live every 60s`;

  allTickets=clientEmails.map(e=>({id:e.id,email:e,priority:classifyPriority(e)}));
  allTickets.forEach(t=>{ticketCategory[t.id]=classifyCategory(t.email);});
  autoAssign(allTickets);

  document.getElementById('meta').textContent=
    `${allTickets.length} tickets · 90 days · polling every 60s`;
  renderBoard();
  setInterval(pollNewEmails,60000);
})();
</script>
