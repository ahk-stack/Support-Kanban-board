<header>

function isQuintaSender(s){if(!s)return false;const d=(s.split('@')[1]||'').toLowerCase();return d.includes('quinta');}
function getClientEmail(emailObj){
  const sender=emailObj?.sender||'';
  if(!isQuintaSender(sender))return sender.toLowerCase()||null;
  const recipients=Array.isArray(emailObj?.recipients)?emailObj.recipients:[];
  const client=recipients.find(r=>{if(!r||typeof r!=='string')return false;const rl=r.toLowerCase();if(rl===SUPPORT_BOX)return false;if(isQuintaSender(r))return false;if(NO_REPLY_PATTERNS.some(p=>rl.includes(p)))return false;return true;});
  return client?client.toLowerCase():null;
}
function isAutomatic(e){if(!e||!e.sender)return true;const sl=e.sender.toLowerCase();if(sl===SUPPORT_BOX)return true;if(NO_REPLY_PATTERNS.some(p=>sl.includes(p)))return true;if(!e.subject&&!e.summary)return true;const tl=((e.subject||'')+(e.summary||'')).toLowerCase();return NO_REPLY_SUBJECTS.some(p=>tl.includes(p));}

// ── Spam sender management ─────────────────────────────────────────────────
// Records a sender as a permanent spammer and marks ALL their tickets as Spam.
// Returns the number of other tickets retroactively updated.
function recordSpamSender(spamEmail){
  if(!spamEmail||isQuintaSender(spamEmail)||spamSenders.has(spamEmail))return 0;
  spamSenders.add(spamEmail);
  let count=0;
  allTickets.forEach(t=>{
    const te=ticketClientEmail[t.id]||t.email.sender?.toLowerCase();
    if(te===spamEmail){ticketCategory[t.id]='Spam';count++;}
  });
  return count;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function isoMinsAgo(m){return new Date(Date.now()-m*60000).toISOString();}
function isoDaysAgo(d){return new Date(Date.now()-d*86400000).toISOString();}
function fmtDate(iso){if(!iso)return'';const d=new Date(iso),now=new Date(),diff=now-d,mins=Math.floor(diff/60000);if(mins<1)return'Just now';if(mins<60)return mins+'m ago';const hrs=Math.floor(diff/3600000);if(hrs<24)return'Today '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});const days=Math.floor(diff/86400000);if(days===1)return'Yesterday '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});if(days<7)return d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'});}
function senderName(s){if(!s)return'Unknown';if(s.startsWith('/O=')){const m=s.match(/CN=([^/]+)$/i);return m?m[1]:s;}const m=s.match(/^(.+?)@/);return m?m[1].replace(/[._-]/g,' '):s;}
function parseJsonStream(text){const r=[];let d=0,s=-1,inS=false,e2=false;for(let i=0;i<text.length;i++){const c=text[i];if(e2){e2=false;continue;}if(c==='\\'&&inS){e2=true;continue;}if(c==='"'){inS=!inS;continue;}if(inS)continue;if(c==='{'){if(d===0)s=i;d++;}else if(c==='}'){d--;if(d===0&&s!==-1){try{r.push(JSON.parse(text.slice(s,i+1)));}catch(_){}s=-1;}}}return r;}
function extractEmails(res){if(!res||res.isError)return[];if(Array.isArray(res.structuredContent))return res.structuredContent;if(res.structuredContent&&typeof res.structuredContent==='object'){const a=Object.values(res.structuredContent).find(v=>Array.isArray(v));if(a)return a;}const raw=(res.content||[]).map(c=>c.text||'').join('');if(raw.trim().startsWith('['))try{return JSON.parse(raw);}catch(_){}return parseJsonStream(raw);}
function hsResults(res){if(!res||res.isError)return[];const sc=res.structuredContent;if(sc?.results)return sc.results;if(Array.isArray(sc))return sc;const raw=(res.content||[]).map(c=>c.text||'').join('');try{const p=JSON.parse(raw);return p.results||p||[];}catch(_){return parseJsonStream(raw);}}

async function enrichWithHubSpot(){
  const emailSet=new Set();
  allTickets.forEach(t=>{const ce=ticketClientEmail[t.id]||getClientEmail(t.email);if(ce){ticketClientEmail[t.id]=ce;if(!(ce in hsCache))emailSet.add(ce);}});
  const emails=[...emailSet];if(!emails.length)return;
  const hsStatus=document.getElementById('hs-status');const hsProgress=document.getElementById('hs-progress');hsStatus.style.display='flex';
  const foundContacts=[];const BATCH=50;
  for(let i=0;i<emails.length;i+=BATCH){
    const batch=emails.slice(i,i+BATCH);hsProgress.textContent=`Contacts ${Math.min(i+BATCH,emails.length)}/${emails.length}…`;
    const cRes=await window.cowork.callMcpTool(HS_SEARCH,{objectType:'contacts',filterGroups:[{filters:[{propertyName:'email',operator:'IN',values:batch}]}],properties:['email','firstname','lastname'],limit:BATCH,chatInsights:HS_INSIGHTS});
    const contacts=hsResults(cRes);batch.forEach(email=>{if(!contacts.find(c=>c.properties?.email?.toLowerCase()===email))hsCache[email]=null;});foundContacts.push(...contacts);
  }
  const CONCURRENT=5;
  for(let i=0;i<foundContacts.length;i+=CONCURRENT){
    const chunk=foundContacts.slice(i,i+CONCURRENT);hsProgress.textContent=`Companies ${Math.min(i+CONCURRENT,foundContacts.length)}/${foundContacts.length}…`;
    await Promise.all(chunk.map(async contact=>{
      const email=(contact.properties?.email||'').toLowerCase();if(!email||email in hsCache)return;
      const contactName=[contact.properties?.firstname,contact.properties?.lastname].filter(Boolean).join(' ')||email;
      const coRes=await window.cowork.callMcpTool(HS_SEARCH,{objectType:'companies',filterGroups:[{associatedWith:[{objectType:'contacts',operator:'EQUAL',objectIdValues:[parseInt(contact.id)]}]}],properties:['name','domain','createdate'],sorts:[{propertyName:'createdate',direction:'ASCENDING'}],limit:10,chatInsights:HS_INSIGHTS});
      const companies=hsResults(coRes);const primary=companies[0]||null;
      hsCache[email]={contactId:contact.id,contactName,companyName:primary?.properties?.name||null,companyId:primary?.id||null,contactUrl:`https://app.hubspot.com/contacts/25445053/record/0-1/${contact.id}`,companyUrl:primary?`https://app.hubspot.com/contacts/25445053/record/0-2/${primary.id}`:null,allCompanies:companies.map(c=>c.properties?.name).filter(Boolean)};
    }));
    saveHsCache();updateCompanyFilter();renderBoard();
  }
  hsStatus.style.display='none';
}

function updateCompanyFilter(){
  const companies=new Map();allTickets.forEach(t=>{const ce=ticketClientEmail[t.id];const hs=ce?hsCache[ce]:null;if(hs?.companyName)companies.set(hs.companyName,true);});
  const sel=document.getElementById('company-filter');const cur=sel.value;sel.innerHTML='<option value="all">All companies</option>';
  [...companies.keys()].sort((a,b)=>a.localeCompare(b)).forEach(name=>{const cnt=allTickets.filter(t=>{const ce=ticketClientEmail[t.id];return ce&&hsCache[ce]?.companyName===name;}).length;const o=document.createElement('option');o.value=name;o.textContent=name+' ('+cnt+')';if(name===cur)o.selected=true;sel.appendChild(o);});
}

function classifyPriority(e){const t=((e.subject||'')+(e.summary||'')).toLowerCase();if(e.importance==='high'||/urgent|asap|critical|not working|broken|error|cannot|bloqué/.test(t))return'High';if(/info|question|hello|bonjour|dear/.test(t))return'Low';return'Medium';}
function classifyCategory(e){const t=((e.subject||'')+(e.summary||'')).toLowerCase();if(/connect|integr|pms|channel|webhook|api|crm/.test(t))return'Connectivity request';if(/velma|chatbot|bot/.test(t))return'Bug Velma';if(/rya|rethink|wrong answer/.test(t))return'RYA';if(/technical|down|not working|broken|error|fail/.test(t))return'Technical failure';return'Other';}
function autoAssignNew(tickets){const load=Object.fromEntries(SUPPORT_AGENTS.map(a=>[a,0]));Object.entries(ticketAssignee).forEach(([,a])=>{if(a in load)load[a]++;});tickets.forEach(t=>{if(ticketAssignee[t.id])return;const agent=SUPPORT_AGENTS.reduce((m,a)=>load[a]<load[m]?a:m,SUPPORT_AGENTS[0]);ticketAssignee[t.id]=agent;load[agent]++;});}
function updateWorkload(){const load=Object.fromEntries(SUPPORT_AGENTS.map(a=>[a,0]));allTickets.forEach(t=>{const a=ticketAssignee[t.id];if(a in load)load[a]++;});const sorted=SUPPORT_AGENTS.map(a=>({a,n:load[a]})).sort((x,y)=>y.n-x.n).slice(0,5);document.getElementById('workload-bar').innerHTML=sorted.map(({a,n})=>`<div class="agent-pill" style="background:${agentColor(a)}20;color:${agentColor(a)}">${a} <span class="cnt">${n}</span></div>`).join('');}

const nextAgent=cur=>{const i=SUPPORT_AGENTS.indexOf(cur);return SUPPORT_AGENTS[i>=0?(i+1)%SUPPORT_AGENTS.length:0];};
const nextPriority=cur=>PRIORITIES[(PRIORITIES.indexOf(cur)+1)%PRIORITIES.length];

function makeCard(ticket,isNew=false){
  const{email,id}=ticket;
  const priority=ticketPriority[id]||ticket.priority;
  const agent=ticketAssignee[id]||SUPPORT_AGENTS[0];
  const cat=ticketCategory[id];
  const isSpam=cat==='Spam';
  const comments=ticketComments[id]||[];
  const isTagged=taggedTickets.has(id);
  const catOpts=CATEGORIES.map(c=>`<option value="${esc(c)}"${c===cat?' selected':''}>${esc(c)}</option>`).join('');
  const ac=agentColor(agent);
  const clientEmail=ticketClientEmail[id]||null;
  const isInternalReply=isQuintaSender(email.sender)&&!!clientEmail;
  const hs=clientEmail?hsCache[clientEmail]:undefined;

  let hsHtml='';
  if(clientEmail===null)hsHtml='';
  else if(hs===undefined)hsHtml='<div class="hs-row"><span class="hs-pending">🔍 Looking up HubSpot…</span></div>';
  else if(hs!==null){
    let inner='';
    if(hs.companyName){inner+=`<span class="hs-company" title="${esc(hs.allCompanies?.join(' · ')||hs.companyName)}">🏢 <span class="hs-company-name">${esc(hs.companyName)}</span>`;if(hs.companyUrl)inner+=` <a class="hs-link" href="${esc(hs.companyUrl)}" target="_blank">⟶</a>`;inner+=`</span>`;}
    if(hs.contactName&&hs.contactName.toLowerCase()!==clientEmail){inner+=`<span class="hs-contact">`;if(hs.contactUrl)inner+=`<a href="${esc(hs.contactUrl)}" target="_blank">`;inner+=esc(hs.contactName);if(hs.contactUrl)inner+=`</a>`;inner+=`</span>`;}
    if(inner)hsHtml=`<div class="hs-row">${inner}</div>`;
  }

  let senderHtml='';
  if(isInternalReply){senderHtml=`<div class="card-sender-reply"><span style="color:#4f46e5;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px;" title="${esc(clientEmail)}">👤 ${esc(senderName(clientEmail))}</span><span style="color:#94a3b8;">↩️ ${esc(senderName(email.sender))}</span></div>`;}
  else{senderHtml=`<span class="card-sender" title="${esc(email.sender)}">👤 ${esc(senderName(email.sender))}</span>`;}

  const div=document.createElement('div');
  div.className=`card p-${priority}${isNew?' is-new':''}${isTagged?' tagged':''}${isSpam?' cat-spam':''}`;
  div.draggable=true;div.dataset.id=id;

  div.innerHTML=`
    <div class="card-row1">
      <div class="card-title">${esc(email.subject||'(no subject)')}</div>
      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;">
        ${isSpam?'<span class="spam-badge">SPAM</span>':''}
        <button class="pbadge pb-${priority}" data-pr="${id}">${priority}</button>
      </div>
    </div>
    <div class="card-summary">${esc(email.summary||'No preview.')}</div>
    <div class="card-controls">
      <select class="cat-select${isSpam?' is-spam':''}" data-cat="${id}">${catOpts}</select>
    </div>
    ${hsHtml}
    <div class="card-footer">
      ${senderHtml}
      <div class="card-actions">
        <span class="card-date">${fmtDate(email.receivedDateTime)}</span>
        <button class="open-email-btn" data-oe="${id}">📧 Open</button>
        <button class="agent-badge-card" data-ag="${id}" style="background:${ac}">${agent}</button>
        <button class="com-btn${comments.length?' has-comments':''}" data-oc="${id}">💬${comments.length?` <span class="com-badge">${comments.length}</span>`:''}</button>
      </div>
    </div>`;

  div.addEventListener('dragstart',e=>{e.dataTransfer.setData('ticketId',id);setTimeout(()=>div.classList.add('dragging'),0);});
  div.addEventListener('dragend',()=>div.classList.remove('dragging'));
  div.querySelector('[data-pr]').addEventListener('click',e=>{e.stopPropagation();ticketPriority[id]=nextPriority(priority);saveState();renderBoard();});
  div.querySelector('[data-ag]').addEventListener('click',e=>{e.stopPropagation();ticketAssignee[id]=nextAgent(agent);saveState();updateWorkload();renderBoard();});

  // ── Category change — with spam sender learning ────────────────────────
  div.querySelector('[data-cat]').addEventListener('change',e=>{
    const newCat=e.target.value;
    ticketCategory[id]=newCat;
    if(newCat==='Spam'){
      // Determine the effective client email to block
      const spamEmail=ticketClientEmail[id]||email.sender?.toLowerCase();
      if(spamEmail&&!isQuintaSender(spamEmail)){
        const retroCount=recordSpamSender(spamEmail);
        const msg=retroCount>1
          ?`🚫 Spam recorded — ${retroCount} tickets from this sender marked`
          :'🚫 Spam sender recorded — future emails auto-categorized';
        showToast(msg,'spam');
      }
    }
    saveState();
    renderBoard();
  });

  div.querySelector('[data-oe]').addEventListener('click',ev=>{ev.stopPropagation();openEmailModal(ticket);});
  div.querySelector('[data-oc]').addEventListener('click',ev=>{ev.stopPropagation();openComModal(ticket);});
  return div;
}

function renderBoard(){
  allTickets.sort((a,b)=>{const ta=new Date(a.email.receivedDateTime||0).getTime(),tb=new Date(b.email.receivedDateTime||0).getTime();return sortDesc?tb-ta:ta-tb;});
  rebuildTagged();
  ['new','inp','res'].forEach(col=>{
    const tickets=allTickets.filter(t=>{
      const p=ticketPriority[t.id]||t.priority;
      if(activeP!=='all'&&p!==activeP)return false;
      if(activeA==='tagged')return taggedTickets.has(t.id);
      if(activeA!=='all'&&ticketAssignee[t.id]!==activeA)return false;
      if(activeCompany!=='all'){const ce=ticketClientEmail[t.id];const hs=ce?hsCache[ce]:null;if(!hs||hs.companyName!==activeCompany)return false;}
      return(ticketState[t.id]||'new')===col;
    });
    const el=document.getElementById('col-'+col);const icons={new:'📭',inp:'🚧',res:'🎉'};
    el.innerHTML='';
    if(!tickets.length)el.innerHTML=`<div class="empty"><div class="empty-icon">${icons[col]}</div>No tickets</div>`;
    else tickets.forEach(t=>el.appendChild(makeCard(t)));
    document.getElementById('badge-'+col).textContent=tickets.length;
  });
  updateWorkload();
}

async function openEmailModal(ticket){
  const{email,id}=ticket;const clientEmail=ticketClientEmail[id];const hs=clientEmail?hsCache[clientEmail]:null;const isReply=isQuintaSender(email.sender)&&!!clientEmail;
  document.getElementById('em-title').textContent=email.subject||'(no subject)';
  let metaHtml=isReply?`<span><strong>Client:</strong> ${esc(clientEmail)}</span><span><strong>Replied by:</strong> ${esc(email.sender)}</span>`:`<span><strong>From:</strong> ${esc(email.sender||'—')}</span>`;
  metaHtml+=`<span><strong>Received:</strong> ${fmtDate(email.receivedDateTime)}</span><span><strong>Agent:</strong> ${ticketAssignee[id]||'—'}</span>`;
  if(hs?.companyName)metaHtml+=`<span><strong>Company:</strong> ${esc(hs.companyName)}${hs.companyUrl?` <a href="${esc(hs.companyUrl)}" target="_blank" style="color:#f59e0b;font-size:11px;">↗ HubSpot</a>`:''}</span>`;
  if(hs?.allCompanies?.length>1)metaHtml+=`<span style="font-size:10px;color:#94a3b8;" title="${esc(hs.allCompanies.join(', '))}">+${hs.allCompanies.length-1} more</span>`;
  document.getElementById('em-meta').innerHTML=metaHtml;
  document.getElementById('em-body').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const ol=document.getElementById('em-outlook');ol.onclick=email.webLink?()=>window.open(email.webLink,'_blank'):null;ol.style.display=email.webLink?'':'none';
  document.getElementById('email-modal').classList.add('open');
  const uri=(email.uri||`mail:///messages/${email.id}`).split('?')[0]+'?owner='+encodeURIComponent(SUPPORT_BOX);
  const res=await window.cowork.callMcpTool(READ_TOOL,{uri});
  if(res.isError){document.getElementById('em-body').innerHTML=`<p style="color:#64748b;font-style:italic">${esc(email.summary||'No preview.')}</p>`;return;}
  const sc=res.structuredContent;let body='';
  if(sc){body=sc.body?.content||sc.bodyPreview||sc.preview||'';if((sc.body?.contentType||'').toLowerCase()==='html'){body=body.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/<style[\s\S]*?<\/style>/gi,'').replace(/<a /gi,'<a target="_blank" ');}else body=body.replace(/\n/g,'<br>');}
  if(!body){const raw=(res.content||[]).map(c=>c.text||'').join('');body=raw?raw.replace(/\n/g,'<br>'):'<em style="color:#94a3b8">No content.</em>';}
  document.getElementById('em-body').innerHTML=`<div style="overflow-wrap:break-word">${body}</div>`;
}

function renderThread(id){const cs=ticketComments[id]||[];const el=document.getElementById('com-thread');if(!cs.length){el.innerHTML='<div class="no-comments">💬 No comments yet.</div>';return;}el.innerHTML=cs.map(c=>{const tagHtml=(c.tags||[]).map(t=>{const bg=t===CLIENT_TAG?'#475569':agentColor(t);return`<span class="ctag" style="background:${bg}">@${t}</span>`;}).join('');const bg=ALL_AGENTS.includes(c.author)?agentColor(c.author):'#475569';return`<div class="comment-item"><div class="comment-avatar" style="background:${bg}">${esc(c.author)}</div><div class="comment-bubble"><div class="comment-header"><span class="comment-author">${esc(c.author)}</span><span class="comment-time">${fmtTime(c.ts)}</span>${tagHtml?`<div class="comment-tags">${tagHtml}</div>`:''}</div><div class="comment-text">${esc(c.text)}</div></div></div>`;}).join('');el.scrollTop=el.scrollHeight;}
function openComModal(ticket){const{email,id}=ticket;comTicketId=id;const clientEmail=ticketClientEmail[id];const hs=clientEmail?hsCache[clientEmail]:null;const coStr=hs?.companyName?' · 🏢 '+hs.companyName:'';const who=isQuintaSender(email.sender)&&clientEmail?`Client: ${clientEmail}`:email.sender||'—';document.getElementById('com-title').textContent=email.subject||'(no subject)';document.getElementById('com-subtitle').textContent=`${who}${coStr} · ${ticketAssignee[id]||'—'} · ${fmtDate(email.receivedDateTime)}`;document.getElementById('com-input').value='';selectedTags.clear();document.querySelectorAll('.tag-chip').forEach(c=>c.classList.remove('selected'));renderThread(id);document.getElementById('com-modal').classList.add('open');}
document.getElementById('com-post').addEventListener('click',()=>{const text=document.getElementById('com-input').value.trim();if(!text||!comTicketId)return;if(!ticketComments[comTicketId])ticketComments[comTicketId]=[];const tags=[...selectedTags];const author=currentUser();ticketComments[comTicketId].push({author,text,tags,ts:Date.now()});document.getElementById('com-input').value='';selectedTags.clear();document.querySelectorAll('.tag-chip').forEach(c=>c.classList.remove('selected'));saveState();renderThread(comTicketId);renderBoard();const at=tags.filter(t=>t!==CLIENT_TAG);if(at.length)showToast('Comment posted · Tagged: '+at.join(', '));else showToast('Comment posted');});

function getMentions(user){const r=[];Object.entries(ticketComments).forEach(([tid,cs])=>{const t=allTickets.find(x=>x.id===tid);cs.forEach((c,ci)=>{if(c.tags&&c.tags.includes(user))r.push({ticketId:tid,ci,comment:c,ticket:t,key:`${tid}:${ci}`});});});return r.sort((a,b)=>(b.comment.ts||0)-(a.comment.ts||0));}
function updateMentionsBadge(){const me=currentUser();const u=getMentions(me).filter(m=>!readMentions.has(m.key)).length;const badge=document.getElementById('mentions-badge');const btn=document.getElementById('mentions-btn');if(u>0){badge.textContent=u>99?'99+':u;badge.style.display='flex';btn.classList.add('has-mentions');}else{badge.style.display='none';btn.classList.remove('has-mentions');}}
function renderMentions(){const me=currentUser();const mentions=getMentions(me);const unread=mentions.filter(m=>!readMentions.has(m.key)).length;document.getElementById('mentions-title').textContent='🔔 My Mentions — '+me;document.getElementById('mentions-info').textContent=mentions.length+' mention'+(mentions.length!==1?'s':'')+' · '+(unread>0?unread+' unread':'all read');const list=document.getElementById('mentions-list');if(!mentions.length){list.innerHTML='<div class="mentions-empty" style="text-align:center;padding:40px 20px;color:#94a3b8;"><div style="font-size:36px;margin-bottom:10px;">🔕</div><div>No mentions yet</div></div>';return;}list.innerHTML='';mentions.forEach(({ticketId,ci,comment,ticket,key})=>{const isUnread=!readMentions.has(key);const card=document.createElement('div');card.className='mention-card'+(isUnread?' unread':'');const tagHtml=(comment.tags||[]).filter(t=>t!==CLIENT_TAG).map(t=>`<span class="mention-tag" style="background:${agentColor(t)}">@${t}</span>`).join('');const bg=ALL_AGENTS.includes(comment.author)?agentColor(comment.author):'#64748b';const ttl=ticket?.email?.subject||'(deleted)';const ce=ticket?ticketClientEmail[ticket.id]:null;const hs=ce?hsCache[ce]:null;const coInfo=hs?.companyName?' · 🏢 '+hs.companyName:'';const col=ticketState[ticketId]||'new';const colLabel={new:'📥 New',inp:'⚙️ In Progress',res:'✅ Resolved'}[col]||'📥 New';card.innerHTML=`<div class="mention-card-top"><div><div class="mention-ticket">${esc(ttl)}</div><div style="font-size:10px;color:#94a3b8;">${colLabel}${coInfo}</div></div><span class="mention-time">${fmtTime(comment.ts)}</span></div><div class="mention-from"><span class="mention-from-avatar" style="background:${bg}">${esc(comment.author)}</span><strong>${esc(comment.author)}</strong> tagged you</div>${tagHtml?`<div class="mention-tags">${tagHtml}</div>`:''}<div class="mention-comment">${esc(comment.text)}</div><div class="mention-footer">${isUnread?`<button class="btn-mention-mark" data-key="${esc(key)}">Mark read</button>`:''} ${ticket?`<button class="btn-mention-view" data-tid="${esc(ticketId)}">View thread ↗</button>`:''}</div>`;card.querySelector('.btn-mention-mark')?.addEventListener('click',()=>{readMentions.add(key);saveReads();renderMentions();updateMentionsBadge();});card.querySelector('.btn-mention-view')?.addEventListener('click',()=>{readMentions.add(key);saveReads();document.getElementById('mentions-modal').classList.remove('open');if(ticket)openComModal(ticket);updateMentionsBadge();});card.addEventListener('click',()=>{if(isUnread){readMentions.add(key);saveReads();card.classList.remove('unread');updateMentionsBadge();}});list.appendChild(card);});}
document.getElementById('mentions-btn').addEventListener('click',()=>{renderMentions();document.getElementById('mentions-modal').classList.add('open');setTimeout(()=>{getMentions(currentUser()).forEach(m=>{readMentions.add(m.key);});saveReads();updateMentionsBadge();},2000);});
document.getElementById('mark-all-read').addEventListener('click',()=>{getMentions(currentUser()).forEach(m=>{readMentions.add(m.key);});saveReads();renderMentions();updateMentionsBadge();});

function addTickets(emails){
  let n=0;
  emails.filter(e=>e.id&&!seen[e.id]&&!isAutomatic(e)).forEach(e=>{
    seen[e.id]=true;
    const t={id:e.id,email:e,priority:classifyPriority(e)};
    const ce=getClientEmail(e);
    if(ce)ticketClientEmail[e.id]=ce;
    // ── Spam auto-categorization ────────────────────────────────────────
    // If the effective sender is a known spammer, ALWAYS override category
    const effectiveEmail=ce||e.sender?.toLowerCase();
    if(effectiveEmail&&spamSenders.has(effectiveEmail)){
      ticketCategory[e.id]='Spam'; // auto-mark — no manual action needed
    }else if(!ticketCategory[e.id]){
      ticketCategory[e.id]=classifyCategory(e);
    }
    // Assignment: only set if not already saved
    if(!ticketAssignee[e.id]){
      const load=Object.fromEntries(SUPPORT_AGENTS.map(a=>[a,allTickets.filter(x=>ticketAssignee[x.id]===a).length]));
      ticketAssignee[e.id]=SUPPORT_AGENTS.reduce((m,a)=>load[a]<load[m]?a:m,SUPPORT_AGENTS[0]);
    }
    allTickets.push(t);n++;
  });
  return n;
}

async function poll(){
  const after=isoMinsAgo(POLL_WIN_MINS);
  const res=await window.cowork.callMcpTool(SEARCH_TOOL,{limit:20,afterDateTime:after,mailboxOwnerEmail:SUPPORT_BOX});
  const n=addTickets(extractEmails(res));
  document.getElementById('last-poll').textContent='Checked: '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  if(n>0){saveState();showToast(n+' new ticket'+(n>1?'s':'')+' arrived!');renderBoard();enrichWithHubSpot();}
  startCountdown();
}

(async()=>{
  buildAgentUI();
  loadState(); // restore ALL state including spamSenders
  document.getElementById('fstats').textContent='Fetching latest emails…';
  const[recentRes,weekRes]=await Promise.all([
    window.cowork.callMcpTool(SEARCH_TOOL,{limit:50,mailboxOwnerEmail:SUPPORT_BOX}),
    window.cowork.callMcpTool(SEARCH_TOOL,{limit:50,afterDateTime:isoDaysAgo(7),mailboxOwnerEmail:SUPPORT_BOX})
  ]);
  const raw=[...extractEmails(recentRes),...extractEmails(weekRes)];
  const deduped=[...new Map(raw.filter(e=>e.id).map(e=>[e.id,e])).values()];
  deduped.sort((a,b)=>new Date(b.receivedDateTime||0)-new Date(a.receivedDateTime||0));
  const total=addTickets(deduped);
  autoAssignNew(allTickets);
  // Retroactively apply spam to any ticket whose sender was marked after initial load
  allTickets.forEach(t=>{
    const te=ticketClientEmail[t.id]||t.email.sender?.toLowerCase();
    if(te&&spamSenders.has(te))ticketCategory[t.id]='Spam';
  });
  saveState(); // always persist after initial load
  const filtered=deduped.length-total,newest=allTickets[0]?.email?.receivedDateTime;
  document.getElementById('fstats').textContent=`${total} tickets · ${filtered} automated excluded · most recent: ${newest?fmtDate(newest):'—'}`;
  document.getElementById('meta').textContent=`${total} tickets · polling every ${POLL_SECS}s`;
  renderBoard();updateCompanyFilter();startCountdown();
  enrichWithHubSpot();
  setInterval(poll,POLL_SECS*1000);
})();
</script>
