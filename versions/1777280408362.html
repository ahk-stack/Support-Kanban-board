<script type="application/json" id="cowork-artifact-meta">
{
  "name": "Outlook Support Kanban",
  "schemaVersion": 1,
  "description": "Live Kanban board that pulls emails from Outlook, filters out no-reply/automated senders, and classifies each email as a support ticket with priority, category, sender, and date. Columns: New → In Progress → Resolved.",
  "mcpTools": [
    "mcp__5e170d94-d04a-4d6f-be72-371547a2bf8b__outlook_email_search",
    "mcp__5e170d94-d04a-4d6f-be72-371547a2bf8b__read_resource"
  ],
  "mcpServerNames": [
    "Microsoft 365",
    "Microsoft 365"
  ]
}
</script>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Support Kanban — Quinta</title>
<style>
:root{color-scheme:light;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;}

/* HEADER */
header{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.header-left h1{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px;}
.header-left h1 small{font-size:11px;font-weight:400;color:#94a3b8;}
.meta{font-size:11px;color:#64748b;margin-top:2px;display:flex;align-items:center;gap:8px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.agents-bar{display:flex;gap:6px;flex-wrap:wrap;}
.agent-pill{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:7px;font-size:12px;font-weight:600;}
.agent-pill .count{font-size:15px;font-weight:800;}
.a-SGU{background:#ede9fe;color:#5b21b6;}
.a-SHE{background:#dbeafe;color:#1d4ed8;}
.a-ZIO{background:#d1fae5;color:#065f46;}
.a-AHK{background:#ffedd5;color:#c2410c;}

/* TOAST */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:600;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none;display:flex;align-items:center;gap:8px;}
#toast.show{opacity:1;}

/* FILTER BAR */
.filter-bar{background:#fff;border-bottom:1px solid #f1f5f9;padding:9px 18px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:11.5px;color:#64748b;font-weight:600;}
.chip{font-size:11px;padding:3px 10px;border-radius:999px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;color:#475569;transition:all .15s;}
.chip.active{background:#4f46e5;color:#fff;border-color:#4f46e5;}
.sep{width:1px;background:#e2e8f0;margin:0 3px;align-self:stretch;}

/* BOARD */
.board{display:flex;gap:13px;padding:14px 18px;overflow-x:auto;min-height:calc(100vh - 150px);}
.column{flex:1;min-width:265px;max-width:370px;display:flex;flex-direction:column;}
.col-header{padding:10px 14px;border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:13px;}
.col-new .col-header{background:#ede9fe;color:#5b21b6;}
.col-inp .col-header{background:#fef3c7;color:#92400e;}
.col-res .col-header{background:#d1fae5;color:#065f46;}
.col-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:rgba(0,0,0,.12);}
.col-body{background:#e4e6ed;border-radius:0 0 10px 10px;padding:8px;flex:1;display:flex;flex-direction:column;gap:7px;min-height:180px;transition:background .15s;}
.col-body.drag-over{background:#c7d2fe;}

/* CARD */
.card{background:#fff;border-radius:8px;padding:11px 12px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:grab;border-left:3px solid #e2e8f0;transition:box-shadow .15s,transform .15s;user-select:none;}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,.12);transform:translateY(-1px);}
.card.dragging{opacity:.4;}
.card.p-High{border-left-color:#ef4444;}
.card.p-Medium{border-left-color:#f59e0b;}
.card.p-Low{border-left-color:#10b981;}
.card.is-new{animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:none;}}

.card-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px;}
.card-title{font-size:12.5px;font-weight:600;color:#1e293b;line-height:1.4;flex:1;cursor:pointer;}
.card-title:hover{color:#4f46e5;text-decoration:underline;}

/* Priority badge — clickable cycle */
.pbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;flex-shrink:0;cursor:pointer;border:none;outline:none;transition:opacity .15s;}
.pbadge:hover{opacity:.75;}
.pb-High{background:#fee2e2;color:#b91c1c;}
.pb-Medium{background:#fef3c7;color:#92400e;}
.pb-Low{background:#d1fae5;color:#065f46;}

.card-summary{font-size:11px;color:#64748b;line-height:1.5;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-controls{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:7px;}
.cat-select{font-size:10px;border:1px solid #e2e8f0;border-radius:5px;padding:2px 5px;color:#475569;background:#f8fafc;cursor:pointer;flex:1;min-width:0;}
.cat-select:focus{outline:none;border-color:#4f46e5;}
.card-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.card-sender{font-size:10.5px;color:#4f46e5;font-weight:500;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.agent-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;cursor:pointer;border:none;outline:none;transition:opacity .15s;}
.agent-badge:hover{opacity:.75;}
.open-btn{font-size:10px;color:#4f46e5;background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;}
.card-date{font-size:10px;color:#94a3b8;}

/* LOADING / EMPTY */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:160px;color:#94a3b8;gap:10px;}
.spinner{width:26px;height:26px;border:3px solid #e2e8f0;border-top-color:#4f46e5;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:26px 14px;color:#94a3b8;font-size:12px;}
.empty-icon{font-size:24px;margin-bottom:6px;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:12px;width:min(680px,94vw);max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-head{padding:15px 18px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.modal-head h2{font-size:14px;font-weight:700;color:#1e293b;flex:1;line-height:1.4;}
.modal-close{font-size:18px;background:none;border:none;cursor:pointer;color:#94a3b8;line-height:1;}
.modal-close:hover{color:#1e293b;}
.modal-meta{padding:9px 18px;background:#f8fafc;border-bottom:1px solid #f1f5f9;display:flex;gap:14px;flex-wrap:wrap;}
.modal-meta span{font-size:11.5px;color:#64748b;}
.modal-meta strong{color:#1e293b;}
.modal-body{padding:16px 18px;overflow-y:auto;flex:1;font-size:13px;line-height:1.7;color:#374151;}
.modal-actions{padding:11px 18px;border-top:1px solid #f1f5f9;display:flex;gap:8px;justify-content:flex-end;}
.btn-out{font-size:12px;padding:6px 14px;border-radius:7px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;color:#475569;}
.btn-out:hover{background:#f1f5f9;}

/* FILTER STATS */
.fstats{font-size:11px;color:#94a3b8;padding:5px 18px;background:#fafafa;border-bottom:1px solid #f1f5f9;}
</style>
</head>

<script>
const SEARCH_TOOL = 'mcp__5e170d94-d04a-4d6f-be72-371547a2bf8b__outlook_email_search';
const READ_TOOL   = 'mcp__5e170d94-d04a-4d6f-be72-371547a2bf8b__read_resource';
const SUPPORT_BOX = 'support@quinta.im';
const AGENTS      = ['SGU','SHE','ZIO','AHK'];
const CATEGORIES  = ['Technical failure','Bug Velma','RYA','Connectivity request','Other'];
const PRIORITIES  = ['High','Medium','Low'];

// ── Spam filter patterns ──────────────────────────────────────────
const SPAM_SENDER = [
  'noreply','no-reply','donotreply','do-not-reply','notifications@',
  'alerts@','mailer@','newsletter@','news@','info@','promo@','offer@',
  'deals@','marketing@','hello@','team@','digest@','update@','bulk@',
  'auto@','automated@','system@','support@mailchimp','sendgrid',
  'mailchimp','constantcontact','hubspot.com','marketo','klaviyo',
  'googlealerts','linkedin.com','twitter.com','facebook.com',
  'instagram.com','read.ai','atlassian','jira','github.com',
  'gitlab.com','dropbox.com','notion.so','zoom.us','calendly',
  'eventbrite','stripe.com','paypal','amazonaws'
];
const SPAM_SUBJECT = [
  'unsubscribe','newsletter','you are receiving','you\'re receiving',
  'mailing list','promotional','limited time offer','% off','free trial',
  'don\'t miss','click here','verify your email','confirm your',
  'weekly digest','monthly digest','daily digest','recap','roundup',
  'new features','release notes','product update','changelog',
  'invoice from','receipt from','payment received','order confirm',
  'your order','shipment','has been shipped','has shipped',
  'google alert','alert for','job alert','linkedin','twitter'
];

// ── State ──────────────────────────────────────────────────────────
const seen           = new Set();
const ticketState    = {};   // id → 'new'|'inp'|'res'
const ticketAssignee = {};   // id → agent
const ticketCategory = {};   // id → category
const ticketPriority = {};   // id → manual priority override
let allTickets       = [];
let lastPollTime     = new Date();
let pollTimer        = null;
let activeP = 'all', activeA = 'all';

// ── JSON stream parser ─────────────────────────────────────────────
function parseJsonStream(text) {
  const r=[]; let d=0,s=-1,inS=false,esc=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(esc){esc=false;continue;}
    if(c==='\\'&&inS){esc=true;continue;}
    if(c==='"'){inS=!inS;continue;}
    if(inS)continue;
    if(c==='{'){if(d===0)s=i;d++;}
    else if(c==='}'){d--;if(d===0&&s!==-1){try{r.push(JSON.parse(text.slice(s,i+1)));}catch(e){}s=-1;}}
  }
  return r;
}

function extractEmails(res) {
  if(!res||res.isError)return [];
  if(Array.isArray(res.structuredContent))return res.structuredContent;
  if(res.structuredContent&&typeof res.structuredContent==='object'){
    const a=Object.values(res.structuredContent).find(v=>Array.isArray(v));
    if(a)return a;
  }
  const raw=(res.content||[]).map(c=>c.text||'').join('');
  if(raw.trim().startsWith('['))try{return JSON.parse(raw);}catch(e){}
  return parseJsonStream(raw);
}

// ── Spam detection (two layers) ────────────────────────────────────
function isSpamSender(s) {
  if(!s)return true;
  const l=s.toLowerCase();
  if(l===SUPPORT_BOX||l===SUPPORT_BOX.split('@')[0])return true;
  return SPAM_SENDER.some(p=>l.includes(p));
}

function isSpamSubject(subj, summary) {
  if(!subj&&!summary)return true;
  const t=((subj||'')+(summary||'')).toLowerCase();
  return SPAM_SUBJECT.some(p=>t.includes(p));
}

// AI layer: uses sample() to double-check borderline emails
async function aiFilterEmails(emails) {
  // Split into obvious-spam, obvious-real, and borderline
  const real=[], toCheck=[];
  for(const e of emails){
    if(isSpamSender(e.sender)){continue;} // hard exclude
    if(isSpamSubject(e.subject,e.summary)){continue;} // hard exclude
    // Borderline: sender looks real but subject is ambiguous
    toCheck.push(e);
  }

  // Use sample() to batch-classify in one call (max 20 at a time)
  const chunks=[];
  for(let i=0;i<toCheck.length;i+=20)chunks.push(toCheck.slice(i,i+20));

  for(const chunk of chunks){
    const items=chunk.map((e,i)=>`[${i}] From: ${e.sender||''} | Subject: ${e.subject||'(none)'} | Preview: ${(e.summary||'').slice(0,80)}`);
    const res=await window.cowork.sample(
      'You are a spam classifier for a hotel software support inbox. For each email below, reply with ONLY a JSON array of true/false values (true=real client email, false=spam/newsletter/automated). One value per email, same order.',
      items
    );
    if(!res.isError){
      try{
        const flags=JSON.parse(res.text.match(/\[[\s\S]*\]/)?.[0]||'[]');
        chunk.forEach((e,i)=>{ if(flags[i]!==false)real.push(e); });
      }catch(err){
        chunk.forEach(e=>real.push(e)); // fallback: keep all
      }
    }else{
      chunk.forEach(e=>real.push(e)); // fallback: keep all
    }
  }
  return real;
}

// ── Classification ─────────────────────────────────────────────────
function classifyPriority(e){
  const t=((e.subject||'')+(e.summary||'')).toLowerCase();
  if(e.importance==='high'||/urgent|asap|critical|emergency|not working|broken|error|cannot|can't|unable|bloqué|bloquant/.test(t))return'High';
  if(/info|general|question|hello|bonjour|hi |dear /.test(t))return'Low';
  return'Medium';
}
function classifyCategory(e){
  const t=((e.subject||'')+(e.summary||'')).toLowerCase();
  if(/connect|connectivity|integr|pms|channel|webhook|api|interface/.test(t))return'Connectivity request';
  if(/velma|chatbot|bot answer|velma bug/.test(t))return'Bug Velma';
  if(/rya|rethink|wrong answer|incorrect answer/.test(t))return'RYA';
  if(/technical|tech issue|down|not working|broken|error|fail/.test(t))return'Technical failure';
  return'Other';
}

// ── Auto-assign (load-balanced) ─────────────────────────────────────
function autoAssign(tickets){
  const load=Object.fromEntries(AGENTS.map(a=>[a,0]));
  // Count existing assignments
  Object.values(ticketAssignee).forEach(a=>{if(load[a]!==undefined)load[a]++;});
  tickets.forEach(t=>{
    if(ticketAssignee[t.id])return; // already assigned
    const agent=AGENTS.reduce((m,a)=>load[a]<load[m]?a:m,AGENTS[0]);
    ticketAssignee[t.id]=agent;
    load[agent]++;
  });
}

function updateWorkload(){
  const load=Object.fromEntries(AGENTS.map(a=>[a,0]));
  allTickets.forEach(t=>{const a=ticketAssignee[t.id];if(a&&load[a]!==undefined)load[a]++;});
  AGENTS.forEach(a=>{const el=document.getElementById('load-'+a);if(el)el.textContent=load[a];});
}

// ── Toast ───────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),4000);
}

// ── Render ──────────────────────────────────────────────────────────
function nextAgent(cur){return AGENTS[(AGENTS.indexOf(cur)+1)%AGENTS.length];}
function nextPriority(cur){return PRIORITIES[(PRIORITIES.indexOf(cur)+1)%PRIORITIES.length];}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){
  if(!iso)return'';
  const d=new Date(iso);
  const now=new Date();
  const diff=now-d;
  if(diff<3600000)return Math.floor(diff/60000)+'m ago';
  if(diff<86400000)return Math.floor(diff/3600000)+'h ago';
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}
function senderName(s){
  if(!s)return'Unknown';
  if(s.startsWith('/O=')){const m=s.match(/CN=([^/]+)$/i);return m?m[1]:s;}
  const m=s.match(/^(.+?)@/);
  return m?m[1].replace(/[._-]/g,' '):s;
}

function makeCard(ticket, isNew=false){
  const {email,id}=ticket;
  const priority=ticketPriority[id]||ticket.priority;
  const agent=ticketAssignee[id]||AGENTS[0];
  const cat=ticketCategory[id];

  const catOpts=CATEGORIES.map(c=>`<option value="${esc(c)}"${c===cat?' selected':''}>${esc(c)}</option>`).join('');

  const div=document.createElement('div');
  div.className=`card p-${priority}${isNew?' is-new':''}`;
  div.draggable=true;
  div.dataset.id=id;

  div.innerHTML=`
    <div class="card-row1">
      <div class="card-title" data-open="${id}">${esc(email.subject||'(no subject)')}</div>
      <button class="pbadge pb-${priority}" data-prid="${id}" title="Click to change priority">${priority}</button>
    </div>
    <div class="card-summary">${esc(email.summary||'No preview.')}</div>
    <div class="card-controls">
      <select class="cat-select" data-catid="${id}">${catOpts}</select>
    </div>
    <div class="card-footer">
      <span class="card-sender" title="${esc(email.sender)}">👤 ${esc(senderName(email.sender))}</span>
      <div style="display:flex;align-items:center;gap:5px;">
        <span class="card-date">${fmtDate(email.receivedDateTime)}</span>
        <button class="agent-badge a-${agent}" data-agentid="${id}" title="Click to reassign">${agent}</button>
        <button class="open-btn" data-open="${id}">📧</button>
      </div>
    </div>`;

  div.addEventListener('dragstart',e=>{e.dataTransfer.setData('ticketId',id);setTimeout(()=>div.classList.add('dragging'),0);});
  div.addEventListener('dragend',()=>div.classList.remove('dragging'));

  div.querySelector(`[data-prid="${id}"]`).addEventListener('click',e=>{
    e.stopPropagation();
    ticketPriority[id]=nextPriority(ticketPriority[id]||ticket.priority);
    renderBoard();
  });
  div.querySelector(`[data-agentid="${id}"]`).addEventListener('click',e=>{
    e.stopPropagation();
    ticketAssignee[id]=nextAgent(ticketAssignee[id]||AGENTS[0]);
    updateWorkload();renderBoard();
  });
  div.querySelector(`[data-catid="${id}"]`).addEventListener('change',e=>{
    ticketCategory[id]=e.target.value;
  });
  div.querySelectorAll(`[data-open="${id}"]`).forEach(el=>el.addEventListener('click',ev=>{
    ev.stopPropagation();openModal(ticket);
  }));
  return div;
}

function renderBoard(){
  const cols={new:[],inp:[],res:[]};
  for(const t of allTickets){
    const p=ticketPriority[t.id]||t.priority;
    if(activeP!=='all'&&p!==activeP)continue;
    if(activeA!=='all'&&ticketAssignee[t.id]!==activeA)continue;
    cols[ticketState[t.id]||'new'].push(t);
  }
  const icons={new:'📭',inp:'🚧',res:'🎉'};
  const lbls={new:'No tickets',inp:'Drag tickets here',res:'Drag tickets here'};
  for(const[col,tickets]of Object.entries(cols)){
    const el=document.getElementById('col-'+col);
    el.innerHTML='';
    if(!tickets.length){el.innerHTML=`<div class="empty"><div class="empty-icon">${icons[col]}</div>${lbls[col]}</div>`;}
    else tickets.forEach(t=>el.appendChild(makeCard(t)));
    document.getElementById('badge-'+col).textContent=tickets.length;
  }
  updateWorkload();
}

function setupDrop(){
  document.querySelectorAll('.col-body').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{
      e.preventDefault();col.classList.remove('drag-over');
      const id=e.dataTransfer.getData('ticketId');
      if(id){ticketState[id]=col.dataset.col;renderBoard();}
    });
  });
}

function setupFilters(){
  document.querySelectorAll('[data-pf]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('[data-pf]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');activeP=b.dataset.pf;renderBoard();
  }));
  document.querySelectorAll('[data-af]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('[data-af]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');activeA=b.dataset.af;renderBoard();
  }));
}

// ── Modal ────────────────────────────────────────────────────────────
const modalBg=document.getElementById('modal-bg');
document.getElementById('modal-close').addEventListener('click',()=>modalBg.classList.remove('open'));
document.getElementById('modal-close2').addEventListener('click',()=>modalBg.classList.remove('open'));
modalBg.addEventListener('click',e=>{if(e.target===modalBg)modalBg.classList.remove('open');});

async function openModal(ticket){
  const{email,id}=ticket;
  document.getElementById('modal-title').textContent=email.subject||'(no subject)';
  document.getElementById('modal-meta').innerHTML=`
    <span><strong>From:</strong> ${esc(email.sender||'—')}</span>
    <span><strong>Date:</strong> ${fmtDate(email.receivedDateTime)}</span>
    <span><strong>Agent:</strong> ${ticketAssignee[id]||'—'}</span>
    <span><strong>Category:</strong> ${ticketCategory[id]||'—'}</span>
    <span><strong>Priority:</strong> ${ticketPriority[id]||ticket.priority}</span>`;
  document.getElementById('modal-body').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const ol=document.getElementById('modal-outlook');
  ol.onclick=email.webLink?()=>window.open(email.webLink,'_blank'):null;
  ol.style.display=email.webLink?'':'none';
  modalBg.classList.add('open');

  const uri=(email.uri||`mail:///messages/${email.id}`).split('?')[0]+'?owner='+encodeURIComponent(SUPPORT_BOX);
  const res=await window.cowork.callMcpTool(READ_TOOL,{uri});
  if(res.isError){
    document.getElementById('modal-body').innerHTML=`<p style="color:#64748b;font-style:italic">${esc(email.summary||'No preview.')}</p>`;
    return;
  }
  const sc=res.structuredContent;
  let body='';
  if(sc){
    body=sc.body?.content||sc.bodyPreview||sc.preview||'';
    const ct=(sc.body?.contentType||'').toLowerCase();
    if(ct==='html'){body=body.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/<style[\s\S]*?<\/style>/gi,'').replace(/<a /gi,'<a target="_blank" ');}
    else{body=body.replace(/\n/g,'<br>');}
  }
  if(!body){
    const raw=(res.content||[]).map(c=>c.text||'').join('');
    body=raw?raw.replace(/\n/g,'<br>'):'<em style="color:#94a3b8">No content.</em>';
  }
  document.getElementById('modal-body').innerHTML=`<div style="overflow-wrap:break-word">${body}</div>`;
}

// ── Polling for real-time new emails ────────────────────────────────
async function pollNewEmails(){
  const after=lastPollTime.toISOString();
  lastPollTime=new Date();
  const res=await window.cowork.callMcpTool(SEARCH_TOOL,{
    limit:20,
    afterDateTime:after,
    mailboxOwnerEmail:SUPPORT_BOX
  });
  const raw=extractEmails(res);
  const fresh=raw.filter(e=>!seen.has(e.id)&&e.id);
  if(!fresh.length)return;

  // Run through spam filter (fast layer only for real-time)
  const real=fresh.filter(e=>!isSpamSender(e.sender)&&!isSpamSubject(e.subject,e.summary)&&(e.subject||e.summary));
  if(!real.length)return;

  real.forEach(e=>{
    seen.add(e.id);
    const t={id:e.id,email:e,priority:classifyPriority(e)};
    ticketCategory[e.id]=classifyCategory(e);
    ticketAssignee[e.id]=AGENTS.reduce((m,a)=>{
      const load=allTickets.filter(x=>ticketAssignee[x.id]===a).length;
      const mload=allTickets.filter(x=>ticketAssignee[x.id]===m).length;
      return load<mload?a:m;
    },AGENTS[0]);
    allTickets.unshift(t);
  });

  showToast(`${real.length} new ticket${real.length>1?'s':''} arrived`);
  renderBoard();
}

// ── Main ─────────────────────────────────────────────────────────────
(async()=>{
  setupDrop();
  setupFilters();

  // Fetch 5 batches in parallel (up to 250 emails, last 90 days)
  const results=await Promise.all(
    [0,50,100,150,200].map(offset=>
      window.cowork.callMcpTool(SEARCH_TOOL,{limit:50,afterDateTime:'last 90 days',mailboxOwnerEmail:SUPPORT_BOX,offset})
    )
  );

  const raw=results.flatMap(extractEmails);
  const deduped=[...new Map(raw.filter(e=>e.id).map(e=>[e.id,e])).values()];
  deduped.forEach(e=>seen.add(e.id));

  document.getElementById('fstats').textContent=`Fetched ${deduped.length} emails · running AI spam filter…`;

  // Two-layer spam filter
  const clientEmails=await aiFilterEmails(deduped);

  document.getElementById('fstats').textContent=
    `${clientEmails.length} client emails kept · ${deduped.length-clientEmails.length} newsletters/spam excluded`;

  allTickets=clientEmails.map(e=>({id:e.id,email:e,priority:classifyPriority(e)}));
  allTickets.forEach(t=>{ticketCategory[t.id]=classifyCategory(t.email);});
  autoAssign(allTickets);

  document.getElementById('meta').textContent=
    `${allTickets.length} tickets · last 90 days · live polling every 60s`;

  renderBoard();

  // Start real-time polling
  pollTimer=setInterval(pollNewEmails,60000);
})();
</script>
