// ── isAutomatic — 3-layer check ────────────────────────────────────────────
// Layer 1: exact email match → fastest, no false positives
// Layer 2: full domain match → blocks entire domains
// Layer 3: pattern match → catches generic noreply/newsletter patterns
function isAutomatic(e){
  if(!e||!e.sender)return true;
  const sl=e.sender.toLowerCase();
  if(sl===SUPPORT_BOX)return true;
  if(BLOCKED_EMAILS.has(sl))return true;                          // exact email
  const domain=(sl.split('@')[1]||'');
  if(BLOCKED_DOMAINS.has(domain))return true;                     // full domain
  if(NO_REPLY_PATTERNS.some(p=>sl.includes(p)))return true;      // pattern
  if(!e.subject&&!e.summary)return true;
  const tl=((e.subject||'')+(e.summary||'')).toLowerCase();
  return NO_REPLY_SUBJECTS.some(p=>tl.includes(p));
}

function fmtDate(iso){if(!iso)return'';const d=new Date(iso),now=new Date(),diff=now-d,mins=Math.floor(diff/60000);if(mins<1)return'Just now';if(mins<60)return mins+'m ago';const hrs=Math.floor(diff/3600000);if(hrs<24)return'Today '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});const days=Math.floor(diff/86400000);if(days===1)return'Yesterday '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});if(days<7)return d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}

function parseJsonStream(text){const r=[];let d=0,s=-1,inS=false,e2=false;for(let i=0;i<text.length;i++){const c=text[i];if(e2){e2=false;continue;}if(c==='\\'&&inS){e2=true;continue;}if(c==='"'){inS=!inS;continue;}if(inS)continue;if(c==='{'){if(d===0)s=i;d++;}else if(c==='}'){d--;if(d===0&&s!==-1){try{r.push(JSON.parse(text.slice(s,i+1)));}catch(_){}s=-1;}}}return r;}

async function findCompanyByDomain(email,excludeContactId){const domain=(email.split('@')[1]||'').toLowerCase();if(!domain||domain.includes('quinta')||['gmail.com','yahoo.com','hotmail.com','outlook.com','live.com'].includes(domain))return{companies:[],via:null};const domRes=await window.cowork.callMcpTool(HS_SEARCH,{objectType:'companies',filterGroups:[{filters:[{propertyName:'domain',operator:'EQ',value:domain}]}],properties:['name','domain','createdate'],sorts:[{propertyName:'createdate',direction:'ASCENDING'}],limit:5,chatInsights:HS_INSIGHTS});const domCos=hsResults(domRes);if(domCos.length)return{companies:domCos,via:'domain'};const peerRes=await window.cowork.callMcpTool(HS_SEARCH,{objectType:'contacts',filterGroups:[{filters:[{propertyName:'email',operator:'CONTAINS_TOKEN',value:'@'+domain}]}],properties:['email'],limit:8,chatInsights:HS_INSIGHTS});const peers=hsResults(peerRes).filter(c=>c.properties?.email&&(!excludeContactId||c.id.toString()!==excludeContactId.toString()));for(const peer of peers.slice(0,4)){const pCoRes=await window.cowork.callMcpTool(HS_SEARCH,{objectType:'companies',filterGroups:[{associatedWith:[{objectType:'contacts',operator:'EQUAL',objectIdValues:[parseInt(peer.id)]}]}],properties:['name','domain','createdate'],sorts:[{propertyName:'createdate',direction:'ASCENDING'}],limit:5,chatInsights:HS_INSIGHTS});const pCos=hsResults(pCoRes);if(pCos.length)return{companies:pCos,via:'domain-contact'};}return{companies:[],via:null};}

async function enrichWithHubSpot(){const emailSet=new Set();allTickets.forEach(t=>{const ce=ticketClientEmail[t.id]||getClientEmail(t.email);if(ce){ticketClientEmail[t.id]=ce;if(!(ce in hsCache))emailSet.add(ce);}});const emails=[...emailSet];if(!emails.length)return;const hsStatus=document.getElementById('hs-status');const hsProgress=document.getElementById('hs-progress');hsStatus.style.display='flex';const foundContacts=[];const notFoundEmails=[];const BATCH=50;for(let i=0;i<emails.length;i+=BATCH){const batch=emails.slice(i,i+BATCH);hsProgress.textContent=`Contacts ${Math.min(i+BATCH,emails.length)}/${emails.length}…`;const cRes=await window.cowork.callMcpTool(HS_SEARCH,{objectType:'contacts',filterGroups:[{filters:[{propertyName:'email',operator:'IN',values:batch}]}],properties:['email','firstname','lastname'],limit:BATCH,chatInsights:HS_INSIGHTS});const contacts=hsResults(cRes);batch.forEach(email=>{if(!contacts.find(c=>c.properties?.email?.toLowerCase()===email))notFoundEmails.push(email);});foundContacts.push(...contacts);}
const CONCURRENT=5;for(let i=0;i<foundContacts.length;i+=CONCURRENT){const chunk=foundContacts.slice(i,i+CONCURRENT);hsProgress.textContent=`Companies ${Math.min(i+CONCURRENT,foundContacts.length)}/${foundContacts.length}…`;await Promise.all(chunk.map(async contact=>{const email=(contact.properties?.email||'').toLowerCase();if(!email||email in hsCache)return;const contactName=[contact.properties?.firstname,contact.properties?.lastname].filter(Boolean).join(' ')||email;const coRes=await window.cowork.callMcpTool(HS_SEARCH,{objectType:'companies',filterGroups:[{associatedWith:[{objectType:'contacts',operator:'EQUAL',objectIdValues:[parseInt(contact.id)]}]}],properties:['name','domain','createdate'],sorts:[{propertyName:'createdate',direction:'ASCENDING'}],limit:10,chatInsights:HS_INSIGHTS});let companies=hsResults(coRes);let inferredVia=null;if(!companies.length){const fb=await findCompanyByDomain(email,contact.id);companies=fb.companies;inferredVia=fb.via;}const primary=companies[0]||null;hsCache[email]={contactId:contact.id,contactName,companyName:primary?.properties?.name||null,companyId:primary?.id||null,contactUrl:`https://app.hubspot.com/contacts/25445053/record/0-1/${contact.id}`,companyUrl:primary?`https://app.hubspot.com/contacts/25445053/record/0-2/${primary.id}`:null,allCompanies:companies.map(c=>c.properties?.name).filter(Boolean),inferredVia};}));saveHsCache();updateCompanyFilter();if(viewMode==='board')renderBoard();else renderSpamView();}
for(let i=0;i<notFoundEmails.length;i+=CONCURRENT){const chunk=notFoundEmails.slice(i,i+CONCURRENT);hsProgress.textContent=`Domain matching ${Math.min(i+CONCURRENT,notFoundEmails.length)}/${notFoundEmails.length}…`;await Promise.all(chunk.map(async email=>{if(email in hsCache)return;const fb=await findCompanyByDomain(email,null);if(fb.companies.length){const primary=fb.companies[0];hsCache[email]={contactId:null,contactName:null,companyName:primary?.properties?.name||null,companyId:primary?.id||null,contactUrl:null,companyUrl:primary?`https://app.hubspot.com/contacts/25445053/record/0-2/${primary.id}`:null,allCompanies:fb.companies.map(c=>c.properties?.name).filter(Boolean),inferredVia:fb.via};}else{hsCache[email]=null;}}));saveHsCache();updateCompanyFilter();if(viewMode==='board')renderBoard();else renderSpamView();}
hsStatus.style.display='none';}

function updateCompanyFilter(){const companies=new Map();allTickets.filter(t=>ticketCategory[t.id]!=='Spam').forEach(t=>{const ce=ticketClientEmail[t.id];const hs=ce?hsCache[ce]:null;if(hs?.companyName)companies.set(hs.companyName,true);});const sel=document.getElementById('company-filter');const cur=sel.value;sel.innerHTML='<option value="all">All companies</option>';[...companies.keys()].sort((a,b)=>a.localeCompare(b)).forEach(name=>{const cnt=allTickets.filter(t=>ticketCategory[t.id]!=='Spam'&&(()=>{const ce=ticketClientEmail[t.id];return ce&&hsCache[ce]?.companyName===name;})()).length;const o=document.createElement('option');o.value=name;o.textContent=name+' ('+cnt+')';if(name===cur)o.selected=true;sel.appendChild(o);});}
function classifyPriority(e){const t=((e.subject||'')+(e.summary||'')).toLowerCase();if(e.importance==='high'||/urgent|asap|critical|not working|broken|error|cannot|bloqué/.test(t))return'High';if(/info|question|hello|bonjour|dear/.test(t))return'Low';return'Medium';}
function classifyCategory(e){const t=((e.subject||'')+(e.summary||'')).toLowerCase();if(/connect|integr|pms|channel|webhook|api|crm/.test(t))return'Connectivity request';if(/velma|chatbot|bot/.test(t))return'Bug Velma';if(/rya|rethink|wrong answer/.test(t))return'RYA';if(/technical|down|not working|broken|error|fail/.test(t))return'Technical failure';return'Other';}
function autoAssignNew(tickets){const load=Object.fromEntries(SUPPORT_AGENTS.map(a=>[a,0]));Object.entries(ticketAssignee).forEach(([,a])=>{if(a in load)load[a]++;});tickets.forEach(t=>{if(ticketAssignee[t.id])return;const agent=SUPPORT_AGENTS.reduce((m,a)=>load[a]<load[m]?a:m,SUPPORT_AGENTS[0]);ticketAssignee[t.id]=agent;load[agent]++;});}
function updateWorkload(){const load=Object.fromEntries(SUPPORT_AGENTS.map(a=>[a,0]));allTickets.filter(t=>ticketCategory[t.id]!=='Spam').forEach(t=>{const a=ticketAssignee[t.id];if(a in load)load[a]++;});const sorted=SUPPORT_AGENTS.map(a=>({a,n:load[a]})).sort((x,y)=>y.n-x.n).slice(0,5);document.getElementById('workload-bar').innerHTML=sorted.map(({a,n})=>`<div class="agent-pill" style="background:${agentColor(a)}20;color:${agentColor(a)}">${a} <span class="cnt">${n}</span></div>`).join('');}
function showToast(msg,cls=''){const t=document.getElementById('toast');t.textContent=msg;t.className='show'+(cls?' '+cls:'');clearTimeout(t._timer);t._timer=setTimeout(()=>{t.className='';},4500);}
function startCountdown(){pollSecsLeft=POLL_SECS;const cd=document.getElementById('poll-cd');const tick=setInterval(()=>{pollSecsLeft--;cd.textContent=pollSecsLeft>0?'· '+pollSecsLeft+'s':'· checking…';if(pollSecsLeft<=0)clearInterval(tick);},1000);}
function rebuildTagged(){taggedTickets.clear();const me=currentUser();Object.entries(ticketComments).forEach(([id,cs])=>{if(cs.some(c=>c.tags&&c.tags.includes(me)))taggedTickets.add(id);});document.getElementById('tagged-filter').style.display=taggedTickets.size?'':'none';updateMentionsBadge();}
function buildAgentUI(){const sel=document.getElementById('current-user');sel.innerHTML='<optgroup label="Support">'+SUPPORT_AGENTS.map(a=>`<option value="${a}">${a}</option>`).join('')+'</optgroup><optgroup label="CS">'+CS_AGENTS.map(a=>`<option value="${a}">${a}</option>`).join('')+'</optgroup>';const af=document.getElementById('agent-filter');af.innerHTML='<option value="all">All agents</option><optgroup label="Support">'+SUPPORT_AGENTS.map(a=>`<option value="${a}">${a}</option>`).join('')+'</optgroup><optgroup label="CS">'+CS_AGENTS.map(a=>`<option value="${a}">${a}</option>`).join('')+'</optgroup><option value="tagged">🔔 Tagged me</option>';const grid=document.getElementById('tag-grid');grid.innerHTML=[...SUPPORT_AGENTS,...CS_AGENTS,CLIENT_TAG].map(t=>{const bg=t===CLIENT_TAG?'#475569':agentColor(t);return`<span class="tag-chip" data-tag="${t}" style="background:${bg}">${t}${CS_AGENTS.includes(t)?' CS':''}</span>`;}).join('');grid.querySelectorAll('.tag-chip').forEach(chip=>{chip.addEventListener('click',()=>{const tag=chip.dataset.tag;if(selectedTags.has(tag)){selectedTags.delete(tag);chip.classList.remove('selected');}else{selectedTags.add(tag);chip.classList.add('selected');}});});}
const nextAgent=cur=>{const i=SUPPORT_AGENTS.indexOf(cur);return SUPPORT_AGENTS[i>=0?(i+1)%SUPPORT_AGENTS.length:0];};
const nextPriority=cur=>PRIORITIES[(PRIORITIES.indexOf(cur)+1)%PRIORITIES.length];

function makeCard(ticket,isNew=false){const{email,id}=ticket;const priority=ticketPriority[id]||ticket.priority;const agent=ticketAssignee[id]||SUPPORT_AGENTS[0];const cat=ticketCategory[id];const comments=ticketComments[id]||[];const isTagged=taggedTickets.has(id);const catOpts=CATEGORIES.map(c=>`<option value="${esc(c)}"${c===cat?' selected':''}>${esc(c)}</option>`).join('');const ac=agentColor(agent);const clientEmail=ticketClientEmail[id]||null;const isInternalReply=isQuintaSender(email.sender)&&!!clientEmail;const hs=clientEmail?hsCache[clientEmail]:undefined;
  const slaStatus=getSLAStatus(id,priority);
  const slaBadgeHtml=slaStatus?`<div class="sla-row"><span class="sla-badge ${slaStatus.cls}" data-sla-id="${id}" data-sla-priority="${esc(priority)}" title="SLA: ${SLA_HOURS[priority]}h target · Started ${fmtDate(ticketCreatedAt[id])}">⏱ ${slaStatus.text}</span></div>`:'';
  let hsHtml='';if(clientEmail===null)hsHtml='';else if(hs===undefined)hsHtml='<div class="hs-row"><span class="hs-pending">🔍 Looking up HubSpot…</span></div>';else if(hs!==null){let inner='';if(hs.companyName){const ic=hs.inferredVia?' inferred':'';const it=hs.inferredVia?` — inferred from @${(clientEmail||'').split('@')[1]}`:'';inner+=`<span class="hs-company${ic}" title="${esc((hs.allCompanies?.join(' · ')||hs.companyName)+it)}">🏢 <span class="hs-company-name">${esc(hs.companyName)}</span>`;if(hs.inferredVia)inner+=`<span class="hs-inferred-tag">~</span>`;if(hs.companyUrl)inner+=` <a class="hs-link" href="${esc(hs.companyUrl)}" target="_blank">⟶</a>`;inner+=`</span>`;}if(hs.contactName&&hs.contactName.toLowerCase()!==clientEmail){inner+=`<span class="hs-contact">`;if(hs.contactUrl)inner+=`<a href="${esc(hs.contactUrl)}" target="_blank">`;inner+=esc(hs.contactName);if(hs.contactUrl)inner+=`</a>`;inner+=`</span>`;}if(inner)hsHtml=`<div class="hs-row">${inner}</div>`;}
  let senderHtml='';if(isInternalReply){senderHtml=`<div class="card-sender-reply"><span style="color:#4f46e5;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px;" title="${esc(clientEmail)}">👤 ${esc(senderName(clientEmail))}</span><span style="color:#94a3b8;">↩️ ${esc(senderName(email.sender))}</span></div>`;}else{senderHtml=`<span class="card-sender" title="${esc(email.sender)}">👤 ${esc(senderName(email.sender))}</span>`;}
  const div=document.createElement('div');div.className=`card p-${priority}${isNew?' is-new':''}${isTagged?' tagged':''}`;div.draggable=true;div.dataset.id=id;
  div.innerHTML=`<div class="card-row1"><div class="card-title">${esc(email.subject||'(no subject)')}</div><button class="pbadge pb-${priority}" data-pr="${id}">${priority}</button></div><div class="card-summary">${esc(email.summary||'No preview.')}</div><div class="card-controls"><select class="cat-select" data-cat="${id}">${catOpts}</select></div>${slaBadgeHtml}${hsHtml}<div class="card-footer">${senderHtml}<div class="card-actions"><span class="card-date">${fmtDate(email.receivedDateTime)}</span><button class="open-email-btn" data-oe="${id}">📧 Open</button><button class="agent-badge-card" data-ag="${id}" style="background:${ac}">${agent}</button><button class="com-btn${comments.length?' has-comments':''}" data-oc="${id}">💬${comments.length?` <span class="com-badge">${comments.length}</span>`:''}</button></div></div>`;
  div.addEventListener('dragstart',e=>{e.dataTransfer.setData('ticketId',id);setTimeout(()=>div.classList.add('dragging'),0);});div.addEventListener('dragend',()=>div.classList.remove('dragging'));
  div.querySelector('[data-pr]').addEventListener('click',e=>{e.stopPropagation();ticketPriority[id]=nextPriority(priority);saveState();renderBoard();});
  div.querySelector('[data-ag]').addEventListener('click',e=>{e.stopPropagation();ticketAssignee[id]=nextAgent(agent);saveState();updateWorkload();renderBoard();});
  div.querySelector('[data-cat]').addEventListener('change',e=>{const newCat=e.target.value;ticketCategory[id]=newCat;if(newCat==='Spam'){const spamEmail=ticketClientEmail[id]||email.sender?.toLowerCase();if(spamEmail&&!isQuintaSender(spamEmail)){const rc=recordSpamSender(spamEmail);showToast(rc>1?`🚫 Spam recorded — ${rc} tickets marked`:'🚫 Spam sender recorded','spam-t');}}saveState();renderBoard();updateSpamBadge();});
  div.querySelector('[data-oe]').addEventListener('click',ev=>{ev.stopPropagation();openEmailModal(ticket);});
  div.querySelector('[data-oc]').addEventListener('click',ev=>{ev.stopPropagation();openComModal(ticket);});
  return div;
}

function renderBoard(){allTickets.sort((a,b)=>{const ta=new Date(a.email.receivedDateTime||0).getTime(),tb=new Date(b.email.receivedDateTime||0).getTime();return sortDesc?tb-ta:ta-tb;});rebuildTagged();['new','inp','res'].forEach(col=>{const tickets=allTickets.filter(t=>{if(ticketCategory[t.id]==='Spam')return false;const p=ticketPriority[t.id]||t.priority;if(activeP!=='all'&&p!==activeP)return false;if(activeA==='tagged')return taggedTickets.has(t.id);if(activeA!=='all'&&ticketAssignee[t.id]!==activeA)return false;if(activeCompany!=='all'){const ce=ticketClientEmail[t.id];const hs=ce?hsCache[ce]:null;if(!hs||hs.companyName!==activeCompany)return false;}return(ticketState[t.id]||'new')===col;});const el=document.getElementById('col-'+col);const icons={new:'📭',inp:'🚧',res:'🎉'};el.innerHTML='';if(!tickets.length)el.innerHTML=`<div class="empty"><div class="empty-icon">${icons[col]}</div>No tickets</div>`;else tickets.forEach(t=>el.appendChild(makeCard(t)));document.getElementById('badge-'+col).textContent=tickets.length;});updateWorkload();updateSpamBadge();}

document.getElementById('sort-desc').addEventListener('click',()=>{sortDesc=true;document.getElementById('sort-desc').classList.add('active');document.getElementById('sort-asc').classList.remove('active');renderBoard();});
document.getElementById('sort-asc').addEventListener('click',()=>{sortDesc=false;document.getElementById('sort-asc').classList.add('active');document.getElementById('sort-desc').classList.remove('active');renderBoard();});
document.querySelectorAll('[data-pf]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-pf]').forEach(x=>x.classList.remove('active'));b.classList.add('active');activeP=b.dataset.pf;renderBoard();}));
document.getElementById('agent-filter').addEventListener('change',e=>{activeA=e.target.value;renderBoard();});
document.getElementById('company-filter').addEventListener('change',e=>{activeCompany=e.target.value;renderBoard();});
document.getElementById('current-user').addEventListener('change',()=>{renderBoard();updateMentionsBadge();});
document.querySelectorAll('.col-body').forEach(col=>{col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));col.addEventListener('drop',e=>{e.preventDefault();col.classList.remove('drag-over');const id=e.dataTransfer.getData('ticketId');if(!id)return;const prevCol=ticketState[id]||'new';const newCol=col.dataset.col;if(prevCol===newCol)return;ticketState[id]=newCol;saveState();renderBoard();col.classList.add('just-received');setTimeout(()=>col.classList.remove('just-received'),600);showToast('✓ Moved to '+COL_NAMES[newCol]+' — saved','move');});});
document.querySelectorAll('[data-close]').forEach(b=>{b.addEventListener('click',()=>document.getElementById(b.dataset.close).classList.remove('open'));});
document.querySelectorAll('.modal-bg').forEach(bg=>{bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('open');});});

async function openEmailModal(ticket){const{email,id}=ticket;const clientEmail=ticketClientEmail[id];const hs=clientEmail?hsCache[clientEmail]:null;const isReply=isQuintaSender(email.sender)&&!!clientEmail;document.getElementById('em-title').textContent=email.subject||'(no subject)';let metaHtml=isReply?`<span><strong>Client:</strong> ${esc(clientEmail)}</span><span><strong>Replied by:</strong> ${esc(email.sender)}</span>`:`<span><strong>From:</strong> ${esc(email.sender||'—')}</span>`;metaHtml+=`<span><strong>Received:</strong> ${fmtDate(email.receivedDateTime)}</span><span><strong>Agent:</strong> ${ticketAssignee[id]||'—'}</span>`;const sla=getSLAStatus(id,ticketPriority[id]||ticket.priority);if(sla)metaHtml+=`<span><strong>SLA:</strong> <span style="font-weight:600;color:${sla.overdue?'#dc2626':'#d97706'}">⏱ ${sla.text}</span></span>`;if(hs?.companyName){const inf=hs.inferredVia?` ~ inferred from @${(clientEmail||'').split('@')[1]}`:'';metaHtml+=`<span><strong>Company:</strong> ${esc(hs.companyName)}${inf?`<span style="font-size:10px;color:#94a3b8;font-style:italic;"> ${inf}</span>`:''}${hs.companyUrl?` <a href="${esc(hs.companyUrl)}" target="_blank" style="color:#f59e0b;font-size:11px;">↗ HubSpot</a>`:''}</span>`;}if(hs?.allCompanies?.length>1)metaHtml+=`<span style="font-size:10px;color:#94a3b8;" title="${esc(hs.allCompanies.join(', '))}">+${hs.allCompanies.length-1} more</span>`;document.getElementById('em-meta').innerHTML=metaHtml;document.getElementById('em-body').innerHTML='<div class="loading"><div class="spinner"></div></div>';const ol=document.getElementById('em-outlook');ol.onclick=email.webLink?()=>window.open(email.webLink,'_blank'):null;ol.style.display=email.webLink?'':'none';document.getElementById('email-modal').classList.add('open');const uri=(email.uri||`mail:///messages/${email.id}`).split('?')[0]+'?owner='+encodeURIComponent(SUPPORT_BOX);const res=await window.cowork.callMcpTool(READ_TOOL,{uri});if(res.isError){document.getElementById('em-body').innerHTML=`<p style="color:#64748b;font-style:italic">${esc(email.summary||'No preview.')}</p>`;return;}const sc=res.structuredContent;let body='';if(sc){body=sc.body?.content||sc.bodyPreview||sc.preview||'';if((sc.body?.contentType||'').toLowerCase()==='html'){body=body.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/<style[\s\S]*?<\/style>/gi,'').replace(/<a /gi,'<a target="_blank" ');}else body=body.replace(/\n/g,'<br>');}if(!body){const raw=(res.content||[]).map(c=>c.text||'').join('');body=raw?raw.replace(/\n/g,'<br>'):'<em style="color:#94a3b8">No content.</em>';}document.getElementById('em-body').innerHTML=`<div style="overflow-wrap:break-word">${body}</div>`;}
function renderThread(id){const cs=ticketComments[id]||[];const el=document.getElementById('com-thread');if(!cs.length){el.innerHTML='<div class="no-comments">💬 No comments yet.</div>';return;}el.innerHTML=cs.map(c=>{const tagHtml=(c.tags||[]).map(t=>{const bg=t===CLIENT_TAG?'#475569':agentColor(t);return`<span class="ctag" style="background:${bg}">@${t}</span>`;}).join('');const bg=ALL_AGENTS.includes(c.author)?agentColor(c.author):'#475569';return`<div class="comment-item"><div class="comment-avatar" style="background:${bg}">${esc(c.author)}</div><div class="comment-bubble"><div class="comment-header"><span class="comment-author">${esc(c.author)}</span><span class="comment-time">${fmtTime(c.ts)}</span>${tagHtml?`<div class="comment-tags">${tagHtml}</div>`:''}</div><div class="comment-text">${esc(c.text)}</div></div></div>`;}).join('');el.scrollTop=el.scrollHeight;}
function openComModal(ticket){const{email,id}=ticket;comTicketId=id;const clientEmail=ticketClientEmail[id];const hs=clientEmail?hsCache[clientEmail]:null;const coStr=hs?.companyName?(hs.inferredVia?' · 🏢 '+hs.companyName+' ~':' · 🏢 '+hs.companyName):'';const who=isQuintaSender(email.sender)&&clientEmail?`Client: ${clientEmail}`:email.sender||'—';document.getElementById('com-title').textContent=email.subject||'(no subject)';document.getElementById('com-subtitle').textContent=`${who}${coStr} · ${ticketAssignee[id]||'—'} · ${fmtDate(email.receivedDateTime)}`;document.getElementById('com-input').value='';selectedTags.clear();document.querySelectorAll('.tag-chip').forEach(c=>c.classList.remove('selected'));renderThread(id);document.getElementById('com-modal').classList.add('open');}
document.getElementById('com-post').addEventListener('click',()=>{const text=document.getElementById('com-input').value.trim();if(!text||!comTicketId)return;if(!ticketComments[comTicketId])ticketComments[comTicketId]=[];const tags=[...selectedTags];const author=currentUser();ticketComments[comTicketId].push({author,text,tags,ts:Date.now()});document.getElementById('com-input').value='';selectedTags.clear();document.querySelectorAll('.tag-chip').forEach(c=>c.classList.remove('selected'));saveState();renderThread(comTicketId);renderBoard();const at=tags.filter(t=>t!==CLIENT_TAG);if(at.length)showToast('Comment posted · Tagged: '+at.join(', '));else showToast('Comment posted');});
function getMentions(user){const r=[];Object.entries(ticketComments).forEach(([tid,cs])=>{const t=allTickets.find(x=>x.id===tid);cs.forEach((c,ci)=>{if(c.tags&&c.tags.includes(user))r.push({ticketId:tid,ci,comment:c,ticket:t,key:`${tid}:${ci}`});});});return r.sort((a,b)=>(b.comment.ts||0)-(a.comment.ts||0));}
function updateMentionsBadge(){const me=currentUser();const u=getMentions(me).filter(m=>!readMentions.has(m.key)).length;const badge=document.getElementById('mentions-badge');const btn=document.getElementById('mentions-btn');if(u>0){badge.textContent=u>99?'99+':u;badge.style.display='flex';btn.classList.add('has-mentions');}else{badge.style.display='none';btn.classList.remove('has-mentions');}}
function renderMentions(){const me=currentUser();const mentions=getMentions(me);const unread=mentions.filter(m=>!readMentions.has(m.key)).length;document.getElementById('mentions-title').textContent='🔔 My Mentions — '+me;document.getElementById('mentions-info').textContent=mentions.length+' mention'+(mentions.length!==1?'s':'')+' · '+(unread>0?unread+' unread':'all read');const list=document.getElementById('mentions-list');if(!mentions.length){list.innerHTML='<div class="mentions-empty" style="text-align:center;padding:40px 20px;color:#94a3b8;"><div style="font-size:36px;margin-bottom:10px;">🔕</div><div>No mentions yet</div></div>';return;}list.innerHTML='';mentions.forEach(({ticketId,ci,comment,ticket,key})=>{const isUnread=!readMentions.has(key);const card=document.createElement('div');card.className='mention-card'+(isUnread?' unread':'');const tagHtml=(comment.tags||[]).filter(t=>t!==CLIENT_TAG).map(t=>`<span class="mention-tag" style="background:${agentColor(t)}">@${t}</span>`).join('');const bg=ALL_AGENTS.includes(comment.author)?agentColor(comment.author):'#64748b';const ttl=ticket?.email?.subject||'(deleted)';const ce=ticket?ticketClientEmail[ticket.id]:null;const hs=ce?hsCache[ce]:null;const coInfo=hs?.companyName?' · 🏢 '+hs.companyName+(hs.inferredVia?' ~':''):'';const col=ticketState[ticketId]||'new';const colLabel={new:'📥 New',inp:'⚙️ In Progress',res:'✅ Resolved'}[col]||'📥 New';card.innerHTML=`<div class="mention-card-top"><div><div class="mention-ticket">${esc(ttl)}</div><div style="font-size:10px;color:#94a3b8;">${colLabel}${coInfo}</div></div><span class="mention-time">${fmtTime(comment.ts)}</span></div><div class="mention-from"><span class="mention-from-avatar" style="background:${bg}">${esc(comment.author)}</span><strong>${esc(comment.author)}</strong> tagged you</div>${tagHtml?`<div class="mention-tags">${tagHtml}</div>`:''}<div class="mention-comment">${esc(comment.text)}</div><div class="mention-footer">${isUnread?`<button class="btn-mention-mark" data-key="${esc(key)}">Mark read</button>`:''} ${ticket?`<button class="btn-mention-view" data-tid="${esc(ticketId)}">View thread ↗</button>`:''}</div>`;card.querySelector('.btn-mention-mark')?.addEventListener('click',()=>{readMentions.add(key);saveReads();renderMentions();updateMentionsBadge();});card.querySelector('.btn-mention-view')?.addEventListener('click',()=>{readMentions.add(key);saveReads();document.getElementById('mentions-modal').classList.remove('open');if(ticket)openComModal(ticket);updateMentionsBadge();});card.addEventListener('click',()=>{if(isUnread){readMentions.add(key);saveReads();card.classList.remove('unread');updateMentionsBadge();}});list.appendChild(card);});}
document.getElementById('mentions-btn').addEventListener('click',()=>{renderMentions();document.getElementById('mentions-modal').classList.add('open');setTimeout(()=>{getMentions(currentUser()).forEach(m=>{readMentions.add(m.key);});saveReads();updateMentionsBadge();},2000);});
document.getElementById('mark-all-read').addEventListener('click',()=>{getMentions(currentUser()).forEach(m=>{readMentions.add(m.key);});saveReads();renderMentions();updateMentionsBadge();});

function addTickets(emails){let n=0;emails.filter(e=>e.id&&!seen[e.id]&&!isAutomatic(e)).forEach(e=>{seen[e.id]=true;const t={id:e.id,email:e,priority:classifyPriority(e)};const ce=getClientEmail(e);if(ce)ticketClientEmail[e.id]=ce;if(!ticketCreatedAt[e.id])ticketCreatedAt[e.id]=e.receivedDateTime||new Date().toISOString();const effectiveEmail=ce||e.sender?.toLowerCase();if(effectiveEmail&&spamSenders.has(effectiveEmail)){ticketCategory[e.id]='Spam';}else if(!ticketCategory[e.id]){ticketCategory[e.id]=classifyCategory(e);}if(!ticketAssignee[e.id]){const load=Object.fromEntries(SUPPORT_AGENTS.map(a=>[a,allTickets.filter(x=>ticketAssignee[x.id]===a).length]));ticketAssignee[e.id]=SUPPORT_AGENTS.reduce((m,a)=>load[a]<load[m]?a:m,SUPPORT_AGENTS[0]);}allTickets.push(t);n++;});return n;}
async function poll(){const after=isoMinsAgo(POLL_WIN_MINS);const res=await window.cowork.callMcpTool(SEARCH_TOOL,{limit:20,afterDateTime:after,mailboxOwnerEmail:SUPPORT_BOX});const n=addTickets(extractEmails(res));document.getElementById('last-poll').textContent='Checked: '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});if(n>0){saveState();showToast(n+' new ticket'+(n>1?'s':'')+' arrived!');if(viewMode==='board')renderBoard();else renderSpamView();enrichWithHubSpot();}startCountdown();}

(async()=>{
  buildAgentUI();loadState();
  document.getElementById('fstats').textContent='Fetching latest emails…';
  const[recentRes,weekRes]=await Promise.all([window.cowork.callMcpTool(SEARCH_TOOL,{limit:50,mailboxOwnerEmail:SUPPORT_BOX}),window.cowork.callMcpTool(SEARCH_TOOL,{limit:50,afterDateTime:isoDaysAgo(7),mailboxOwnerEmail:SUPPORT_BOX})]);
  const raw=[...extractEmails(recentRes),...extractEmails(weekRes)];
  const deduped=[...new Map(raw.filter(e=>e.id).map(e=>[e.id,e])).values()];
  deduped.sort((a,b)=>new Date(b.receivedDateTime||0)-new Date(a.receivedDateTime||0));
  const total=addTickets(deduped);
  autoAssignNew(allTickets);
  allTickets.forEach(t=>{const te=ticketClientEmail[t.id]||t.email.sender?.toLowerCase();if(te&&spamSenders.has(te))ticketCategory[t.id]='Spam';});
  saveState();
  const nonSpam=allTickets.filter(t=>ticketCategory[t.id]!=='Spam');
  const newest=nonSpam[0]?.email?.receivedDateTime;
  document.getElementById('fstats').textContent=`${nonSpam.length} tickets · most recent: ${newest?fmtDate(newest):'—'}`;
  document.getElementById('meta').textContent=`${allTickets.length} tickets · polling every ${POLL_SECS}s`;
  renderBoard();updateCompanyFilter();updateSpamBadge();startCountdown();
  enrichWithHubSpot();
  setInterval(poll,POLL_SECS*1000);
  setInterval(refreshSLABadges,60000);
})();
</script>
